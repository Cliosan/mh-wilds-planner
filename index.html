// devono portare il proprio. La chiave publishable è pensata per il client;
// i dati sono protetti dalla Row Level Security (ognuno vede solo i propri).
const SUPABASE_APP = {

const ELEM = [["f","Fuoco","#d1603a"],["w","Acqua","#4a90c9"],["t","Tuono","#e0b83c"],["i","Ghiaccio","#6bb8c9"],["d","Drago","#9a6fc9"]];
const SLOTS = ["head","chest","arms","waist","legs"];
const SLOT_LABEL = { weapon:"Arma", head:"Testa", chest:"Busto", arms:"Braccia", waist:"Vita", legs:"Gambe" };
const ICONS = { head:"⛑", chest:"🛡", arms:"🥊", waist:"⛓", legs:"👢" };
const RESMAP = { fire:"f", water:"w", thunder:"t", ice:"i", dragon:"d" };
const WKINDS = { "great-sword":"Spadone","long-sword":"Katana","sword-shield":"Spada e scudo","dual-blades":"Doppie lame",
  "hammer":"Martello","hunting-horn":"Corno da caccia","lance":"Lancia","gunlance":"Lanciacannone","switch-axe":"Spadascia",
  "charge-blade":"Spada caricata","insect-glaive":"Falcione insetto","bow":"Arco","light-bowgun":"Balestra leggera","heavy-bowgun":"Balestra pesante" };

/* ---- elementi/stati per la modifica manuale delle armi Artian ------------ */
const WDMG = [["fire","Fuoco"],["water","Acqua"],["thunder","Tuono"],["ice","Ghiaccio"],["dragon","Drago"],
  ["poison","Veleno"],["paralysis","Paralisi"],["sleep","Sonno"],["blast","Esplosione"]];
const DMG_LABEL = Object.fromEntries(WDMG);
const STATUS_TYPES = new Set(["poison","paralysis","sleep","blast"]);
const codeFromLabel = (lbl) => { for (const [c, l] of WDMG) if (l === lbl || c === lbl) return c; return "none"; };
const parseSlots = (str) => (str || "").split(/[^0-9]+/).filter(Boolean).map(Number).filter(n => n >= 1 && n <= 3);

/* Applica al pezzo-arma di base gli override manuali (stat + abilità Artian).
   Non muta l'originale: restituisce una copia con i valori effettivi. */
function effectiveWeapon(w, wmods) {
  if (!w) return w;
  const m = wmods || {};
  const out = { ...w };
  if (m.raw != null && m.raw !== "") out.raw = Number(m.raw);
  if (m.aff != null && m.aff !== "") out.aff = Number(m.aff);
  if (m.slots != null) out.slots = m.slots;
  if (m.dmgType !== undefined) {
    const val = Number(m.dmgVal) || 0;
    if (m.dmgType === "none" || m.dmgType === "") { out.el = null; out.st = null; }
    else if (STATUS_TYPES.has(m.dmgType)) { out.st = [DMG_LABEL[m.dmgType] || m.dmgType, val]; out.el = null; }
    else { out.el = [DMG_LABEL[m.dmgType] || m.dmgType, val]; out.st = null; }
  }
  out.skills = [...(w.skills || []), ...((m.skills) || [])];
  return out;
}

/* ---- riserva minima (se manca sia cache che rete) ------------------------ */
const SAMPLE = {

    131:{name:"Anima del Signore",kind:"group",thresholds:[{pieces:3,desc:"Tenacia: sopravvivi a un colpo letale."}]} },

    {id:"s_c",set:1,setName:"Esempio",slot:"chest",rank:"high",def:60,res:{f:0,w:0,t:0,i:0,d:0},slots:[3],skills:[[22,2]],bonuses:[]},
    {id:"s_a",set:1,setName:"Esempio",slot:"arms",rank:"high",def:60,res:{f:0,w:0,t:0,i:0,d:0},slots:[2,1],skills:[[144,2]],bonuses:[]},
    {id:"s_w",set:1,setName:"Esempio",slot:"waist",rank:"high",def:60,res:{f:0,w:0,t:0,i:0,d:0},slots:[2],skills:[[14,2]],bonuses:[]},
    {id:"s_l",set:1,setName:"Esempio",slot:"legs",rank:"high",def:60,res:{f:0,w:0,t:0,i:0,d:0},slots:[2,1],skills:[[122,1]],bonuses:[]},

/* ---- trasformazione API -> formato interno ------------------------------- */
function transform(skillsRaw, setsRaw, decosRaw, charmsRaw, weaponsRaw) {
  const skills = {}, bonuses = {};
  const iconOf = (it) => ({ kind: it && it.icon ? it.icon.kind : "item", color: it && it.icon ? it.icon.color : null });
  const catOf = (k) => k === "offense" || k === "attack" || k === "affinity" || k === "element" || k === "ranged" || k === "handicraft" ? "off"
    : k === "defense" || k === "health" ? "def" : "util";
  for (const s of skillsRaw) {
    const isBonus = s.kind === "set" || s.kind === "group" || s.kind === "series" || (s.ranks || []).some(r => r.setPiecesRequired != null);
    if (isBonus) {
      bonuses[s.id] = { name: s.name, kind: s.kind === "group" ? "group" : "set",
        thresholds: (s.ranks || []).filter(r => r.setPiecesRequired != null)
          .map(r => ({ pieces: r.setPiecesRequired, desc: r.name ? `${r.name} — ${r.description || ""}` : (r.description || "") })) };
    } else {
      const rk = (s.ranks || []).filter(r => r.setPiecesRequired == null);
      skills[s.id] = { name: s.name, cat: catOf(s.icon?.kind), max: Math.max(1, ...(rk.length ? rk : [{ level: 1 }]).map(r => r.level || 1)), desc: s.description || "",
        levels: rk.map(r => ({ level: r.level || 1, desc: r.description || "" })).sort((a, b) => a.level - b.level) };
    }
  }
  const pieces = [];
  for (const set of setsRaw || []) {
    for (const p of set.pieces || []) {
      if (p.rank === "low") continue;                         // niente Low Rank: le build si fanno da High Rank
      const res = { f:0,w:0,t:0,i:0,d:0 };
      if (p.resistances) for (const [k,v] of Object.entries(p.resistances)) if (RESMAP[k]) res[RESMAP[k]] = v;
      const psk = [], pbn = [];
      for (const ps of p.skills || []) {
        const sid = ps.skill?.id; if (sid == null) continue;
        if (ps.setPiecesRequired != null || ["group","set","series"].includes(ps.skill?.kind)) pbn.push(sid);
        else psk.push([sid, ps.level || 1]);
      }
      const cr = p.crafting || {};
      const mats = (cr.materials || []).map(m => ({ id: m.item?.id, name: m.item?.name, icon: iconOf(m.item), qty: m.quantity || 0 })).filter(x => x.id != null);
      pieces.push({ id: "p" + p.id, set: set.id, setName: set.name, slot: p.kind, rank: p.rank,
        def: p.defense?.base ?? 0, res, slots: (p.slots || []).slice(), skills: psk, bonuses: pbn,
        mats, zenny: cr.zennyCost || 0 });
    }
  }
  const decos = (decosRaw || []).map(d => ({ id: "d" + d.id, name: d.name, size: d.slot,
    kind: d.kind === "weapon" ? "weapon" : "armor",
    skills: (d.skills || []).map(s => [s.skill?.id, s.level || 1]).filter(x => x[0] != null) })).filter(d => d.skills.length);
  const charms = [{ id: "c0", name: "— Nessun charm —", skills: [], mats: [], zenny: 0 }];
  for (const c of charmsRaw || []) {
    const ranks = (c.ranks || []).slice().sort((a, b) => (a.level || 0) - (b.level || 0));
    const acc = {}; let zenny = 0;                            // costo cumulativo: rango L include i ranghi 1..L
    for (const r of ranks) {
      const cr = r.crafting || {};
      for (const m of cr.materials || []) {
        const it = m.item; if (!it || it.id == null) continue;
        if (!acc[it.id]) acc[it.id] = { id: it.id, name: it.name, icon: iconOf(it), qty: 0 };
        acc[it.id].qty += m.quantity || 0;
      }
      zenny += cr.zennyCost || 0;
      charms.push({ id: "c" + c.id + "_" + r.level, name: r.name,
        skills: (r.skills || []).map(s => [s.skill?.id, s.level || 1]).filter(x => x[0] != null),
        mats: Object.values(acc).map(x => ({ ...x })), zenny });
    }
  }
  // indice per risalire l'albero di potenziamento (serve anche per armi Low Rank non elencate)
  const wRawById = {};
  for (const w of weaponsRaw || []) if (w && w.id != null) wRawById[w.id] = w;
  // materiali totali per forgiare l'arma da zero: radice (craftingMaterials) + tutti i potenziamenti (upgradeMaterials)
  function weaponTreeMaterials(w) {
    const acc = {}; let zenny = 0; let cur = w; let guard = 0;
    while (cur && guard++ < 60) {
      const c = cur.crafting || {};
      const root = c.previous == null;
      const list = root ? (c.craftingMaterials || []) : (c.upgradeMaterials || []);
      zenny += root ? (c.craftingZennyCost || 0) : (c.upgradeZennyCost || 0);
      for (const m of list) {
        const it = m.item; if (!it || it.id == null) continue;
        if (!acc[it.id]) acc[it.id] = { id: it.id, name: it.name, icon: iconOf(it), qty: 0 };
        acc[it.id].qty += m.quantity || 0;
      }
      cur = (c.previous && c.previous.id != null) ? wRawById[c.previous.id] : null;
    }
    return { mats: Object.values(acc), zenny };
  }
  const weapons = [{ id: "w0", kind: "great-sword", name: "— Nessuna arma —", slots: [], skills: [], raw: 0, aff: 0, el: null, st: null, rarity: 0, mats: [], zenny: 0 }];
  for (const w of weaponsRaw || []) {
    if ((w.rarity || 0) < 5) continue;                        // solo High Rank (rarità 5-8)
    let el = null, st = null;
    for (const sp of w.specials || []) {
      if (sp.kind === "element" && sp.element) el = [sp.element, sp.damage?.display ?? sp.damage?.raw ?? 0];
      else if (sp.kind === "status" && sp.status) st = [sp.status, sp.damage?.display ?? sp.damage?.raw ?? 0];
    }
    const tree = weaponTreeMaterials(w);
    weapons.push({ id: "w" + w.kind + "_" + w.id, kind: w.kind, name: w.name, slots: (w.slots || []).slice(),
      skills: (w.skills || []).map(s => [s.skill?.id, s.level || 1]).filter(x => x[0] != null),
      raw: w.damage?.raw ?? 0, aff: w.affinity ?? 0, el, st, rarity: w.rarity || 0,
      mats: tree.mats, zenny: tree.zenny });
  }
  return { source: "live", skills, bonuses, pieces, decos, charms, weapons };
}

/* ========================================================================== */
function App() {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState("Controllo la cache locale…");

  useEffect(() => {
    let alive = true;
    (async () => {
      // 1) cache locale
      try {
        const c = await window.storage.get(DB_KEY);
        if (c && c.value) { const d = JSON.parse(c.value); if (alive) { setData({ ...d, source: "cache" }); return; } }
      } catch (e) {}
      // 2) rete
      setStatus("Scarico il database ufficiale (armature, armi, gioielli, charm, abilità)…");
      try {
        const j = async (u) => { const r = await fetch(u); if (!r.ok) throw new Error(u); return r.json(); };
        const [sk, st, de, ch, we] = await Promise.all([
          j(`${API}/skills`), j(`${API}/armor/sets`), j(`${API}/decorations`), j(`${API}/charms`), j(`${API}/weapons`),
        ]);
        if (!alive) return;
        const d = transform(sk, st, de, ch, we);
        setData(d);
        try { await window.storage.set(DB_KEY, JSON.stringify({ skills:d.skills, bonuses:d.bonuses, pieces:d.pieces, decos:d.decos, charms:d.charms, weapons:d.weapons })); } catch (e) {}
      } catch (e) {
        if (alive) setData(SAMPLE);
      }
    })();
    return () => { alive = false; };
  }, []);

  const sync = useSupabaseSync();
  if (!data) return <Loading status={status} />;
  return <Shell data={data} sync={sync} />;
}

/* ===================== sincronizzazione cloud (Supabase) =====================
   Local-first: l'app funziona identica senza login. Con un progetto Supabase
   configurato e l'utente autenticato, build e inventario materiali vivono anche
   nel cloud e si allineano tra i dispositivi. */
function loadSyncCfg() {
  try { const c = JSON.parse(localStorage.getItem(SYNC_CFG_KEY) || "null"); if (c && c.url && c.key) return c; } catch (e) {}
  return SUPABASE_APP; // default: progetto ufficiale dell'app
}

/* unione delle build per id: a parità di id prevale la versione del cloud */
function mergeBuilds(local, cloud) {
  const map = new Map();
  (local || []).forEach(b => { if (b && b.id) map.set(b.id, b); });
  (cloud || []).forEach(b => { if (b && b.id) map.set(b.id, b); });
  return [...map.values()];
}

function useSupabaseSync() {
  const [cfg, setCfg] = useState(loadSyncCfg);
  const [client, setClient] = useState(null);
  const [user, setUser] = useState(null);
  const [msg, setMsg] = useState("");
  useEffect(() => {
    if (!cfg || !cfg.url || !cfg.key) { setClient(null); setUser(null); return; }
    if (!window.supabase || !window.supabase.createClient) { setMsg("La sincronizzazione richiede la versione dell'app ospitata online (qui la libreria non è disponibile)."); return; }
    let c;
    try { c = window.supabase.createClient(cfg.url, cfg.key); } catch (e) { setMsg("Configurazione Supabase non valida."); return; }
    setClient(c); setMsg("");
    c.auth.getSession().then(({ data }) => setUser(data && data.session ? data.session.user : null)).catch(() => {});
    const { data: sub } = c.auth.onAuthStateChange((_e, session) => setUser(session ? session.user : null));
    return () => { try { sub.subscription.unsubscribe(); } catch (e) {} };
  }, [cfg]);
  const saveCfg = (url, key) => { const n = { url: (url || "").trim(), key: (key || "").trim() }; try { localStorage.setItem(SYNC_CFG_KEY, JSON.stringify(n)); } catch (e) {} setCfg(n); setMsg(""); };
  const clearCfg = () => { try { localStorage.removeItem(SYNC_CFG_KEY); } catch (e) {} setCfg(null); setClient(null); setUser(null); setMsg(""); };
  return { cfg, client, user, msg, setMsg, saveCfg, clearCfg };
}

function Loading({ status }) {

function Shell({ data, sync }) {

  const srcLabel = data.source === "cache" ? `${data.pieces.length} pezzi · ${data.weapons.length - 1} armi · offline`
    : data.source === "live" ? `${data.pieces.length} pezzi · ${data.weapons.length - 1} armi · live`
    : "dati di esempio";
  return (
    <div className="mh-root"><style>{CSS}</style>
      <header className="mh-header">
        <div className="mh-crest">◆</div>
        <div className="mh-titlewrap"><h1>Pianificatore Build</h1><p className="mh-sub">Monster Hunter Wilds</p></div>
        <span className={"mh-badge " + (data.source === "sample" ? "offline" : "live")}>{srcLabel}</span>
        <AccountBar sync={sync} />
      </header>
      <nav className="mh-tabs">
        <button className={tab === "build" ? "on" : ""} onClick={() => setTab("build")}>Costruttore</button>
        <button className={tab === "resources" ? "on" : ""} onClick={() => setTab("resources")}>Risorse</button>
        <button className={tab === "compare" ? "on" : ""} onClick={() => setTab("compare")}>Confronto</button>
      </nav>
      <Planner data={data} tab={tab} setTab={setTab} sync={sync} />
      {data.source === "sample" && <p className="mh-footer">Non è stato possibile scaricare il database né trovarne una copia locale. Stai usando un piccolo campione. Riapri l'app dove la rete è consentita per scaricare (una volta sola) l'intero database.</p>}
    </div>
  );
}

/* barra account nell'header + pannello di login/configurazione */
function AccountBar({ sync }) {
  const [open, setOpen] = useState(false);
  // senza la libreria Supabase (es. versione Artifact) la sync non è possibile: niente barra account
  if (!(typeof window !== "undefined" && window.supabase)) return null;
  const email = sync && sync.user ? (sync.user.email || "") : "";
  const short = email ? (email.length > 20 ? email.slice(0, 18) + "…" : email) : "";
  return (
    <>
      <button className={"mh-acct" + (sync && sync.user ? " on" : "")} onClick={() => setOpen(true)}
        title="Sincronizzazione account">
        <span className="mh-acct-dot" />{sync && sync.user ? short : "Accedi"}
      </button>
      {open && <AccountPanel sync={sync} onClose={() => setOpen(false)} />}
    </>
  );
}

function AccountPanel({ sync, onClose }) {
  const needCfg = !sync.cfg || !sync.cfg.url || !sync.cfg.key;
  const [mode, setMode] = useState(needCfg ? "cfg" : "login"); // cfg | login | signup
  const [url, setUrl] = useState(sync.cfg ? sync.cfg.url : "");
  const [key, setKey] = useState(sync.cfg ? sync.cfg.key : "");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [ok, setOk] = useState("");

  const saveCfg = () => {
    if (!url.trim() || !key.trim()) { setErr("Inserisci URL del progetto e chiave anon."); return; }
    sync.saveCfg(url, key); setErr(""); setOk(""); setMode("login");
  };
  const auth = async () => {
    if (!sync.client) { setErr(sync.msg || "Configura prima il progetto Supabase."); return; }
    if (!email.trim() || !pw) { setErr("Email e password richieste."); return; }
    setBusy(true); setErr(""); setOk("");
    try {
      const res = mode === "signup"
        ? await sync.client.auth.signUp({ email: email.trim(), password: pw })
        : await sync.client.auth.signInWithPassword({ email: email.trim(), password: pw });
      if (res.error) throw res.error;
      if (mode === "signup" && !(res.data && res.data.session)) {
        setOk("Registrato. Conferma l'email (se richiesto), poi accedi."); setMode("login");
      } else { onClose(); }
    } catch (e) { setErr(e.message || "Errore di autenticazione."); }
    setBusy(false);
  };
  const signOut = async () => { try { await sync.client.auth.signOut(); } catch (e) {} onClose(); };
  const google = () => {
    if (!sync.client) { setErr(sync.msg || "Servizio non disponibile."); return; }
    // dopo Google torniamo alla stessa pagina (senza frammento #...)
    sync.client.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.href.split("#")[0] } });
  };

  return (
    <div className="mh-modal" onMouseDown={onClose}>
      <div className="mh-modal-card" onMouseDown={e => e.stopPropagation()}>
        <div className="mh-modal-h"><span>Sincronizzazione account</span><button className="mh-modal-x" onClick={onClose}>×</button></div>

        {sync.user ? (
          <div className="mh-acctbody">
            <p className="mh-acct-status"><span className="mh-acct-dot on" /> Connesso come <b>{sync.user.email}</b></p>
            <p className="mh-acct-note">Le tue build e l'inventario materiali si sincronizzano automaticamente su questo progetto. Apri l'app su un altro dispositivo, configura lo stesso progetto e accedi con questo account per ritrovare tutto.</p>
            <div className="mh-acct-row">
              <button className="mh-btn" onClick={signOut}>Esci</button>
            </div>
          </div>
        ) : mode === "cfg" ? (
          <div className="mh-acctbody">
            <p className="mh-acct-note">Incolla i dati del <b>tuo</b> progetto Supabase (li trovi in <i>Project Settings → API</i>). Restano salvati solo su questo dispositivo.</p>
            <label className="mh-fld"><span>URL del progetto</span>
              <input className="mh-input" placeholder="https://xxxx.supabase.co" value={url} onChange={e => setUrl(e.target.value)} /></label>
            <label className="mh-fld"><span>Chiave anon (public)</span>
              <input className="mh-input" placeholder="eyJhbGciOi…" value={key} onChange={e => setKey(e.target.value)} /></label>
            {err && <p className="mh-acct-err">{err}</p>}
            <div className="mh-acct-row"><button className="mh-btn" onClick={saveCfg}>Salva configurazione</button></div>
          </div>
        ) : (
          <div className="mh-acctbody">
            <button className="mh-gbtn" onClick={google}><span className="mh-gicon">G</span> Continua con Google</button>
            <div className="mh-or"><span>oppure con email</span></div>
            <div className="mh-acct-tabs">
              <button className={mode === "login" ? "on" : ""} onClick={() => { setMode("login"); setErr(""); }}>Accedi</button>
              <button className={mode === "signup" ? "on" : ""} onClick={() => { setMode("signup"); setErr(""); }}>Registrati</button>
            </div>
            <label className="mh-fld"><span>Email</span>
              <input className="mh-input" type="email" autoComplete="email" value={email} onChange={e => setEmail(e.target.value)} /></label>
            <label className="mh-fld"><span>Password</span>
              <input className="mh-input" type="password" autoComplete={mode === "signup" ? "new-password" : "current-password"} value={pw} onChange={e => setPw(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") auth(); }} /></label>
            {err && <p className="mh-acct-err">{err}</p>}
            {ok && <p className="mh-acct-ok">{ok}</p>}
            {sync.msg && <p className="mh-acct-err">{sync.msg}</p>}
            <div className="mh-acct-row">
              <button className="mh-btn" onClick={auth} disabled={busy}>{busy ? "…" : mode === "signup" ? "Crea account" : "Accedi"}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------------------- planner ------------------------------------- */
function emptyLoadout() { return { weapon: "w0", pieces: { head:"", chest:"", arms:"", waist:"", legs:"" }, charm: "c0", decos: {}, wmods: {}, cskills: [] }; }

function Planner({ data, tab, setTab, sync }) {
  const [lo, setLo] = useState(emptyLoadout);
  const [builds, setBuilds] = useState([]);
  const [name, setName] = useState("");
  const [owned, setOwned] = useState({});
  const [syncMsg, setSyncMsg] = useState("");
  const syncReady = useRef(false);
  const pushT = useRef(null);
  const uid = sync && sync.user ? sync.user.id : null;

  useEffect(() => { (async () => { try { const r = await window.storage.get(BUILDS_KEY); if (r && r.value) setBuilds(JSON.parse(r.value)); } catch (e) {} })(); }, []);
  useEffect(() => { (async () => { try { const r = await window.storage.get(MATS_KEY); if (r && r.value) setOwned(JSON.parse(r.value)); } catch (e) {} })(); }, []);
  const persist = async (next) => { setBuilds(next); try { await window.storage.set(BUILDS_KEY, JSON.stringify(next)); } catch (e) {} };
  const persistOwned = async (next) => { setOwned(next); try { await window.storage.set(MATS_KEY, JSON.stringify(next)); } catch (e) {} };

  // al login: scarico dal cloud, unisco al locale (nessuna perdita) e riallineo entrambi
  useEffect(() => {
    let alive = true;
    if (!sync || !sync.client || !uid) { syncReady.current = false; return; }
    syncReady.current = false;
    (async () => {
      setSyncMsg("Sincronizzo…");
      try {
        const { data: row, error } = await sync.client.from("user_data").select("builds,owned").eq("user_id", uid).maybeSingle();
        if (!alive) return;
        if (error) throw error;
        const mb = mergeBuilds(builds, (row && row.builds) || []);
        const mo = { ...(owned || {}), ...((row && row.owned) || {}) };
        setBuilds(mb); try { await window.storage.set(BUILDS_KEY, JSON.stringify(mb)); } catch (e) {}
        setOwned(mo); try { await window.storage.set(MATS_KEY, JSON.stringify(mo)); } catch (e) {}
        syncReady.current = true;
        const up = await sync.client.from("user_data").upsert({ user_id: uid, builds: mb, owned: mo, updated_at: new Date().toISOString() });
        if (alive) setSyncMsg(up.error ? "Errore sync" : "Sincronizzato ✓");
      } catch (e) { if (alive) setSyncMsg("Errore sync: " + (e.message || "")); }
    })();
    return () => { alive = false; };
  }, [uid]);

  // ad ogni modifica (una volta pronto): invio al cloud, con debounce
  useEffect(() => {
    if (!sync || !sync.client || !uid || !syncReady.current) return;
    clearTimeout(pushT.current);
    setSyncMsg("Salvo…");
    pushT.current = setTimeout(() => {
      sync.client.from("user_data").upsert({ user_id: uid, builds, owned, updated_at: new Date().toISOString() })
        .then(({ error }) => setSyncMsg(error ? "Errore sync" : "Sincronizzato ✓")).catch(() => setSyncMsg("Errore sync"));
    }, 1200);
    return () => clearTimeout(pushT.current);
  }, [builds, owned]);

  const pieceById = useMemo(() => Object.fromEntries(data.pieces.map(p => [p.id, p])), [data]);
  const decoById  = useMemo(() => Object.fromEntries(data.decos.map(d => [d.id, d])), [data]);
  const charmById = useMemo(() => Object.fromEntries(data.charms.map(c => [c.id, c])), [data]);
  const weaponById= useMemo(() => Object.fromEntries(data.weapons.map(w => [w.id, w])), [data]);
  const piecesBySlot = useMemo(() => {
    const m = { head:[], chest:[], arms:[], waist:[], legs:[] };
    for (const p of data.pieces) if (m[p.slot]) m[p.slot].push(p);
    for (const k in m) m[k].sort((a,b) => a.setName.localeCompare(b.setName)); return m;
  }, [data]);

  const result = useMemo(() => compute(lo, { pieceById, decoById, charmById, weaponById, skills: data.skills, bonuses: data.bonuses }), [lo, data, pieceById, decoById, charmById, weaponById]);
  const materials = useMemo(() => aggregateMaterials(lo, { pieceById, weaponById, charmById }), [lo, pieceById, weaponById, charmById]);

  const setPiece = (slot, id) => setLo(l => { const decos = {}; Object.keys(l.decos).forEach(k => { if (!k.startsWith(slot + "#")) decos[k] = l.decos[k]; }); return { ...l, pieces: { ...l.pieces, [slot]: id }, decos }; });
  const setWeapon = (id) => setLo(l => { const decos = {}; Object.keys(l.decos).forEach(k => { if (!k.startsWith("weapon#")) decos[k] = l.decos[k]; }); return { ...l, weapon: id, decos, wmods: {} }; });
  const setCharm = (id) => setLo(l => ({ ...l, charm: id, cskills: [] }));
  const setDeco = (key, id) => setLo(l => ({ ...l, decos: { ...l.decos, [key]: id } }));
  const setWmod = (patch) => setLo(l => ({ ...l, wmods: { ...(l.wmods || {}), ...patch } }));
  const setCSkills = (arr) => setLo(l => ({ ...l, cskills: arr }));
  const setWSlots = (arr) => setLo(l => {
    const base = weaponById[l.weapon];
    const slots = (arr && arr.length) ? arr : undefined;
    const effLen = slots ? slots.length : (base ? base.slots.length : 0);
    const decos = {};
    Object.keys(l.decos).forEach(k => {
      if (!k.startsWith("weapon#")) { decos[k] = l.decos[k]; return; }
      if (Number(k.split("#")[1]) < effLen) decos[k] = l.decos[k];
    });
    return { ...l, decos, wmods: { ...(l.wmods || {}), slots } };
  });
  const reset = () => setLo(emptyLoadout());

  const save = () => {
    const w = weaponById[lo.weapon];
    persist([...builds, { id: "b" + Date.now(), name: name.trim() || `Build ${builds.length + 1}`,
      weapon: w && w.id !== "w0" ? w.name : null, def: result.def, res: result.res,
      atk: result.atk, aff: result.aff,
      grade: result.score.grade, overall: result.score.overall, offense: result.score.offense, survival: result.score.survival, qol: result.score.qol, efr: result.score.efr,
      lo: { weapon: lo.weapon, pieces: { ...lo.pieces }, charm: lo.charm, decos: { ...lo.decos }, wmods: { ...(lo.wmods || {}) }, cskills: [...(lo.cskills || [])] },
      skills: result.skills.map(s => ({ name: s.name, level: s.level, cat: s.cat })),
      bonuses: result.activeBonuses.map(b => `${b.name} (${b.have} pz)`) }]);
    setName("");
  };
  const del = (id) => persist(builds.filter(b => b.id !== id));
  const load = (b) => { if (b.lo) { setLo({ weapon: b.lo.weapon || "w0", pieces: { ...emptyLoadout().pieces, ...b.lo.pieces }, charm: b.lo.charm || "c0", decos: { ...b.lo.decos }, wmods: b.lo.wmods ? { ...b.lo.wmods } : {}, cskills: b.lo.cskills ? [...b.lo.cskills] : [] }); setName(b.name); } };

  if (tab === "compare") return <Compare builds={builds} del={del} load={(b) => { load(b); setTab("build"); }} goBuild={() => setTab("build")} />;
  if (tab === "resources") return <Resources materials={materials} owned={owned} setOwned={persistOwned} goBuild={() => setTab("build")} />;

  const weapon = weaponById[lo.weapon];
  const weaponEff = effectiveWeapon(weapon, lo.wmods);
  const slotSources = [];
  if (weaponEff && weaponEff.slots.length) slotSources.push({ owner:"weapon", label:"Arma", slots:weaponEff.slots, kind:"weapon" });
  for (const s of SLOTS) { const p = pieceById[lo.pieces[s]]; if (p) slotSources.push({ owner:s, label:SLOT_LABEL[s], slots:p.slots, kind:"armor" }); }

  return (
    <div className="mh-grid">
      <section className="mh-builder">
        <div className="mh-eyebrow">Equipaggiamento <button className="mh-reset" onClick={reset}>azzera</button></div>

        <div className="mh-slotcard">
          <div className="mh-slotcard-h"><span className="mh-slot-icon">⚔</span><span className="mh-slot-label">Arma</span>
            {weapon && weapon.id !== "w0" && <span className="mh-rank">{WKINDS[weapon.kind] || weapon.kind}</span>}</div>
          <WeaponPicker weapons={data.weapons} value={lo.weapon} onChange={setWeapon} data={data} />
          {weapon && weapon.id !== "w0" && <WeaponInfo w={weaponEff} data={data} />}
          {weapon && weapon.id !== "w0" && (
            <WeaponMods data={data} weapon={weapon} wmods={lo.wmods || {}}
              onPatch={setWmod} onSlots={setWSlots} onSkills={arr => setWmod({ skills: arr })} />
          )}
        </div>

        {SLOTS.map(slot => {
          const p = pieceById[lo.pieces[slot]];
          return (
            <div className="mh-slotcard" key={slot}>
              <div className="mh-slotcard-h"><span className="mh-slot-icon">{ICONS[slot]}</span><span className="mh-slot-label">{SLOT_LABEL[slot]}</span>
                {p && <span className="mh-rank">{rankLabel(p.rank)}</span>}</div>
              <PiecePicker options={piecesBySlot[slot]} value={lo.pieces[slot]} onChange={id => setPiece(slot, id)} data={data} />
              {p && <PieceSkills piece={p} data={data} />}
            </div>
          );
        })}

        <div className="mh-slotcard">
          <div className="mh-slotcard-h"><span className="mh-slot-icon">✦</span><span className="mh-slot-label">Charm</span></div>
          <CharmPicker charms={data.charms} value={lo.charm} onChange={setCharm} data={data} />
          {lo.charm && lo.charm !== "c0" && (
            <div className="mh-manual-wrap">
              <div className="mh-manual-h">Abilità manuali</div>
              <ManualSkills data={data} entries={lo.cskills || []} onChange={setCSkills} />
            </div>
          )}
        </div>

        <div className="mh-eyebrow" style={{ marginTop: 20 }}>Gioielli</div>
        {slotSources.length === 0 && <p className="mh-empty">Equipaggia arma o armatura con slot per inserire gioielli.</p>}
        {slotSources.map(src => (
          <div className="mh-decogroup" key={src.owner}>
            <div className="mh-decogroup-h">{src.label}</div>
            {src.slots.map((size, i) => {
              const key = src.owner + "#" + i;
              const opts = data.decos.filter(d => d.size <= size && d.kind === src.kind);
              return (
                <div className="mh-decoslot" key={key}>
                  <span className="mh-slotpip" data-size={size}>{size}</span>
                  <DecoPicker options={opts} value={lo.decos[key] || ""} onChange={id => setDeco(key, id)} data={data} size={size} />
                </div>
              );
            })}
          </div>
        ))}
      </section>

      <aside className="mh-summary">
        <Summary result={result} equipped={Object.values(lo.pieces).filter(Boolean).length} data={data} hasWeapon={weapon && weapon.id !== "w0"} />
        <div className="mh-save">
          <input className="mh-input" placeholder="Nome build…" value={name} onChange={e => setName(e.target.value)} />
          <button className="mh-btn" onClick={save}>Salva</button>
        </div>
        {sync && sync.user && syncMsg && <p className="mh-syncmsg">{syncMsg}</p>}
        {builds.length > 0 && (
          <div className="mh-saved">
            {builds.map(b => (
              <span className="mh-chip" key={b.id}>
                <button className="mh-chip-name" onClick={() => load(b)} disabled={!b.lo}
                  title={b.lo ? "Richiama questa build per modificarla" : "Build salvata prima dell'aggiornamento: non richiamabile"}>{b.name}</button>
                <button className="mh-chip-x" onClick={() => del(b.id)}>×</button>
              </span>
            ))}
            <button className="mh-link" onClick={() => setTab("compare")}>Confronta ({builds.length}) →</button>
          </div>
        )}
      </aside>
    </div>
  );
}

/* ------------------------- valutazione build ------------------------------
   Modello euristico basato sul meta di MH Wilds (2026). Le abilità condizionali
   (Punto debole, Massima potenza, Istigatore, Risentimento) sono considerate
   ATTIVE, come nelle build meta. Valori per-livello presi dall'API MHDB.
   -------------------------------------------------------------------------- */
const META = {
  aff:  { 3:[4,8,12,16,20], 57:[5,10,15,20,30], 99:[10,20,30], 144:[3,5,7,10,15] }, // affinità % per liv.
  flat: { 72:[3,5,7,8,9], 144:[4,8,12,16,20], 123:[5,10,15,20,25] },                 // ATT fisico piatto
  pct:  { 72:[0,0,0,2,4], 87:[0,5,5,10,30] },                                        // ATT fisico %
  crit: { 22:[28,31,34,37,40] },                                                     // danno critico %
  elem: { 82:1, 13:1, 152:1, 50:1, 91:1, 121:1, 127:1, 41:1 },                       // sinergia elementale
  status:{ 68:1, 9:1, 44:1, 12:1, 116:1, 79:1, 5:1, 40:1 },                          // sinergia stato
  sustain:{ 119:1, 124:1, 126:1, 117:1, 163:1 },                                     // artigianato/affilatura
  WEX:57, AGI:144, MM:99, RES:123, CB:22, DIVINE:122, REC_UP:31, REC_SPD:30,
};
const clamp01 = (x) => x < 0 ? 0 : x > 1 ? 1 : x;
function scoreBuild(sl, w, def, res, bonuses, skillList) {
  const lv = id => sl[id] || 0;
  const at = (tab, id) => (tab[id] && lv(id)) ? (tab[id][lv(id) - 1] || 0) : 0;
  const hasWeapon = w && w.id !== "w0";

  // ---- danno effettivo (EFR): base della valutazione offensiva ----
  let flat = 0, pct = 0, affSkills = 0;
  for (const id in META.flat) flat += at(META.flat, id);
  for (const id in META.pct) pct += at(META.pct, id);
  for (const id in META.aff) affSkills += at(META.aff, id);
  const affTotal = Math.max(-100, Math.min(100, (hasWeapon ? w.aff : 0) + affSkills));
  const critPct = lv(META.CB) ? META.crit[META.CB][lv(META.CB) - 1] : 25; // danno critico base +25%
  const rawTotal = ((hasWeapon ? w.raw : 0) + flat) * (1 + pct / 100);
  const critFactor = affTotal >= 0 ? 1 + (affTotal / 100) * (critPct / 100) : 1 + (affTotal / 100) * 0.25;
  const efr = hasWeapon ? Math.round(rawTotal * critFactor) : 0;

  // ---- OFFESA (0-100), ancorata all'EFR reale invece che a bonus euristici ----
  // Intervallo realistico HR: EFR ~150 (arma nuda) → ~450 (build meta pienamente potenziata).
  let off = 0;
  if (hasWeapon) {
    off = clamp01((efr - 150) / (450 - 150)) * 82;            // nucleo: danno effettivo (0-82)
    if (w.el || w.st) {                                       // elemento/stato: l'EFR non lo cattura
      let syn = false;
      for (const id in META.elem) if (lv(id)) syn = true;
      for (const id in META.status) if (lv(id)) syn = true;
      off += syn ? 10 : 4;
    }
    off += lv(META.WEX) ? 4 : 0;                              // completezza del nucleo critico
    off += lv(META.CB) ? 4 : 0;
  }
  off = Math.round(Math.min(100, off));

  // ---- SOPRAVVIVENZA (0-100) ----
  const resSum = ["f", "w", "t", "i", "d"].reduce((a, k) => a + (res[k] > 0 ? res[k] : 0), 0);
  const divineMit = [0, 0.06, 0.12, 0.20][lv(META.DIVINE)] || 0;
  const gutsRe = /guts|tenac|sopravviv|colpo letale|eroic|salute/i;
  const guts = (bonuses || []).some(b => gutsRe.test(b.name || "") || gutsRe.test(b.desc || ""));
  const healthRe = /salute|vitalit|health/i;
  const healthLv = (skillList || []).filter(s => healthRe.test(s.name || "")).reduce((a, s) => a + s.level, 0);
  let surv = 0;
  surv += clamp01(def / 700) * 42;                            // difesa (HR endgame ~600-800)
  surv += (divineMit / 0.20) * 18;                            // protezione divina piena = 18
  surv += clamp01(resSum / 60) * 14;                          // resistenze elementali
  surv += clamp01((lv(META.REC_UP) + lv(META.REC_SPD)) / 6) * 8;
  surv += clamp01(healthLv / 3) * 6;                          // aumento salute
  surv += guts ? 12 : 0;                                      // colpo letale / tenacia
  surv = Math.round(Math.min(100, surv));

  // ---- QUALITÀ DI VITA (0-100): abilità di utilità (comfort, mobilità, sostentamento) ----
  const utilLv = (skillList || []).filter(s => s.cat === "util").reduce((a, s) => a + Math.min(s.level, s.max), 0);
  let susActive = 0; for (const id in META.sustain) if (lv(id)) susActive++;
  let qol = clamp01(utilLv / 16) * 82 + clamp01(susActive / 2) * 18; // ~16 livelli utility + sostentamento affilatura
  qol = Math.round(Math.min(100, qol));

  // ---- voto complessivo e grado (soglie ricalibrate) ----
  const overall = hasWeapon
    ? Math.round(off * 0.58 + surv * 0.27 + qol * 0.15)
    : Math.round(surv * 0.62 + qol * 0.38);                   // senza arma: solo difesa/comfort
  const grade = overall >= 86 ? "S" : overall >= 72 ? "A" : overall >= 56 ? "B" : overall >= 40 ? "C" : "D";

  const notes = [];
  if (!hasWeapon) notes.push("Nessuna arma: valutazione solo difensiva/comfort");
  else {
    if (efr >= 400) notes.push("Danno effettivo eccellente");
    else if (efr < 260) notes.push(`EFR ${efr} basso per l'endgame`);
    if (affTotal < 100 && affTotal >= 0) notes.push(`Affinità ${affTotal > 0 ? "+" : ""}${affTotal}% (il meta punta al 100%)`);
    else if (affTotal < 0) notes.push(`Affinità negativa ${affTotal}%`);
    if (!lv(META.CB)) notes.push("Manca Bonus critico");
    if (!lv(META.WEX)) notes.push("Manca Punto debole");
  }
  if (surv < 30) notes.push("Sopravvivenza bassa");
  if (qol < 20 && hasWeapon) notes.push("Poche abilità di comfort");
  return { overall, grade, offense: off, survival: surv, qol, efr, affinity: affTotal, guts, notes };
}

/* ------------------------- calcolo aggregato ------------------------------ */
function compute(lo, ctx) {
  const { pieceById, decoById, charmById, weaponById, skills, bonuses } = ctx;
  const raw = {}; const add = (sid, l) => { raw[sid] = (raw[sid] || 0) + l; };
  let def = 0; const res = { f:0,w:0,t:0,i:0,d:0 }; const bonusCount = {};

  for (const s of SLOTS) { const p = pieceById[lo.pieces[s]]; if (!p) continue;
    def += p.def; ELEM.forEach(([k]) => res[k] += p.res[k]);
    p.skills.forEach(([sid, l]) => add(sid, l));
    p.bonuses.forEach(bid => { bonusCount[bid] = (bonusCount[bid] || 0) + 1; });
  }
  const w = weaponById[lo.weapon];
  const wEff = effectiveWeapon(w, lo.wmods);
  if (wEff) wEff.skills.forEach(([sid, l]) => add(sid, l));
  const ch = charmById[lo.charm]; if (ch) ch.skills.forEach(([sid, l]) => add(sid, l));
  (lo.cskills || []).forEach(([sid, l]) => add(sid, l));
  Object.values(lo.decos).forEach(id => { const d = decoById[id]; if (d) d.skills.forEach(([sid, l]) => add(sid, l)); });

  const activeBonuses = []; const bonusList = [];
  for (const [bid, have] of Object.entries(bonusCount)) {
    const meta = bonuses[bid]; if (!meta) continue;
    const ths = (meta.thresholds || []).map(t => ({ pieces: t.pieces, desc: t.desc, unlocked: have >= t.pieces }))
      .sort((a, b) => a.pieces - b.pieces);
    const reached = ths.filter(t => t.unlocked);
    // per il punteggio/salvataggio: solo i bonus effettivamente attivi
    if (reached.length) { const top = reached[reached.length - 1]; activeBonuses.push({ id: bid, name: meta.name, kind: meta.kind, have, desc: top.desc, at: top.pieces }); }
    // per la UI: ogni bonus presente (anche con 1 pezzo), con soglie sbloccate/bloccate
    const nextTh = ths.find(t => !t.unlocked);
    bonusList.push({ id: bid, name: meta.name, kind: meta.kind, have, thresholds: ths,
      anyUnlocked: reached.length > 0, nextAt: nextTh ? nextTh.pieces : null });
  }
  activeBonuses.sort((a, b) => a.kind === b.kind ? 0 : a.kind === "group" ? -1 : 1);
  bonusList.sort((a, b) => (a.kind === b.kind ? 0 : a.kind === "group" ? -1 : 1) || (b.anyUnlocked - a.anyUnlocked) || (b.have - a.have));

  const skillList = Object.entries(raw).map(([sid, r]) => {
    const m = skills[sid] || { name: sid, max: r, cat: "util", desc: "", levels: [] };
    return { id: sid, name: m.name, cat: m.cat, desc: m.desc, levels: m.levels || [], level: Math.min(r, m.max), max: m.max, over: Math.max(0, r - m.max) };
  }).sort((a, b) => a.cat === b.cat ? b.level - a.level : ord(a.cat) - ord(b.cat));

  const slmap = {}; skillList.forEach(s => { slmap[s.id] = s.level; });
  const score = scoreBuild(slmap, wEff, def, res, activeBonuses, skillList);

  return { def, res, skills: skillList, activeBonuses, bonusList, score, atk: wEff ? wEff.raw : 0, aff: wEff ? wEff.aff : 0, el: wEff ? wEff.el : null, st: wEff ? wEff.st : null };
}
const ord = (c) => ({ off:0, util:1, def:2 }[c] ?? 3);
const rankLabel = (r) => r === "low" ? "LR" : r === "high" ? "HR" : r === "master" ? "MR" : (r || "").toUpperCase();

const MATCOLOR = { gray:"#8f8f8f", grey:"#8f8f8f", white:"#d8d2c4", red:"#c0532f", blue:"#3f7fc0",
  green:"#5a9e5a", yellow:"#d9b13b", gold:"#e0b83c", pink:"#cf7fa0", purple:"#9a6fc9",
  orange:"#d0812f", brown:"#8a6a44", black:"#4a4030", cyan:"#5bb8c9", lightblue:"#6bb8c9" };
const matDot = (c) => MATCOLOR[(c || "").toLowerCase()] || (c || "#8a7a5a");

// Somma i materiali dell'intera build corrente: arma (intero albero) + pezzi d'armatura + charm
// (costo cumulativo dei ranghi). I gioielli non sono inclusi: sono drop casuali, non si forgiano.
function aggregateMaterials(lo, ctx) {
  const { pieceById, weaponById, charmById } = ctx;
  const acc = {}; let zenny = 0;
  const addFrom = (mats, z) => {
    (mats || []).forEach(m => {
      if (m.id == null) return;
      if (!acc[m.id]) acc[m.id] = { id: m.id, name: m.name, icon: m.icon || {}, need: 0 };
      acc[m.id].need += m.qty || 0;
    });
    zenny += z || 0;
  };
  const w = weaponById[lo.weapon];
  if (w && w.id !== "w0") addFrom(w.mats, w.zenny);
  for (const s of SLOTS) { const p = pieceById[lo.pieces[s]]; if (p) addFrom(p.mats, p.zenny); }
  const ch = charmById && charmById[lo.charm];
  if (ch && lo.charm !== "c0") addFrom(ch.mats, ch.zenny);
  return { list: Object.values(acc), zenny };
}

function Resources({ materials, owned, setOwned, goBuild }) {
  const { list, zenny } = materials;
  if (!list.length)
    return <div className="mh-compare"><p className="mh-empty big">Equipaggia un'arma o dell'armatura nel <button className="mh-link" onClick={goBuild}>Costruttore</button> per vedere i materiali necessari alla build.</p></div>;

  const setOne = (id, v) => setOwned({ ...owned, [id]: Math.max(0, v | 0) });
  const rows = list.map(m => {
    const have = Math.max(0, owned[m.id] || 0);
    return { ...m, have, done: have >= m.need, remain: Math.max(0, m.need - have) };
  }).sort((a, b) => (a.done - b.done) || (b.remain - a.remain) || a.name.localeCompare(b.name));

  const doneCount = rows.filter(r => r.done).length;
  const pct = Math.round(doneCount / rows.length * 100);
  const clearOwned = () => { const next = { ...owned }; rows.forEach(r => delete next[r.id]); setOwned(next); };

  return (
    <div className="mh-trk">
      <div className="mh-trk-head">
        <div className="mh-trk-prog">
          <div className="mh-trk-progbar"><div className="mh-trk-progfill" style={{ width: pct + "%" }} /></div>
          <span className="mh-trk-progl">{doneCount}/{rows.length} materiali completati · {pct}%</span>
        </div>
        <div className="mh-trk-meta">
          <span>Zenny <b>{zenny.toLocaleString("it-IT")}</b></span>
          <button className="mh-link" onClick={clearOwned}>azzera posseduti</button>
        </div>
      </div>
      <p className="mh-trk-note">Include l'intero albero di potenziamento dell'arma, il crafting di ogni pezzo d'armatura e i ranghi del charm. I gioielli sono esclusi: sono drop casuali, non si forgiano. Segna quanto ne possiedi: l'inventario resta salvato tra le sessioni.</p>
      <div className="mh-ctablewrap"><table className="mh-mattable">
        <thead><tr><th className="mh-ccorner">Materiale</th><th>Serve</th><th>Hai</th><th>Manca</th></tr></thead>
        <tbody>
          {rows.map(r => (
            <tr key={r.id} className={r.done ? "matdone" : ""}>
              <td className="mh-matname">
                <span className="mh-matname-in">
                  <span className="mh-matdot" style={{ background: matDot(r.icon && r.icon.color) }} />
                  <span className="mh-matname-t">{r.name}</span>{r.done && <span className="mh-matcheck">✓</span>}
                </span>
              </td>
              <td className="mh-matneed">{r.need}</td>
              <td>
                <span className="mh-stepper">
                  <button onClick={() => setOne(r.id, r.have - 1)} disabled={r.have <= 0}>−</button>
                  <input className="mh-matinput" type="number" min="0" value={r.have}
                    onChange={e => setOne(r.id, Number(e.target.value))} />
                  <button onClick={() => setOne(r.id, r.have + 1)}>+</button>
                </span>
              </td>
              <td className={r.remain === 0 ? "mh-matok" : "mh-matrem"}>{r.remain === 0 ? "—" : r.remain}</td>
            </tr>
          ))}
        </tbody>
      </table></div>
      <button className="mh-link" onClick={goBuild}>← Torna al costruttore</button>
    </div>
  );
}

/* ------------------------- confronto -------------------------------------- */
function Compare({ builds, del, load, goBuild }) {
  if (builds.length === 0)
    return <div className="mh-compare"><p className="mh-empty big">Nessuna build salvata. Creane una nel <button className="mh-link" onClick={goBuild}>Costruttore</button> e premi Salva.</p></div>;
  const names = []; const seen = new Set();
  builds.forEach(b => b.skills.forEach(s => { if (!seen.has(s.name)) { seen.add(s.name); names.push({ name: s.name, cat: s.cat }); } }));
  names.sort((a, b) => a.cat === b.cat ? a.name.localeCompare(b.name) : ord(a.cat) - ord(b.cat));
  const lvl = (b, n) => { const s = b.skills.find(x => x.name === n); return s ? s.level : 0; };
  const mx = (n) => Math.max(...builds.map(b => lvl(b, n)));
  const maxDef = Math.max(...builds.map(b => b.def));
  const maxOverall = Math.max(...builds.map(b => b.overall || 0));
  const maxEfr = Math.max(...builds.map(b => b.efr || 0));
  return (
    <div className="mh-compare">
      <div className="mh-ctablewrap"><table className="mh-ctable">
        <thead><tr><th className="mh-ccorner">Confronto</th>
          {builds.map(b => <th key={b.id}><div className="mh-cbuild">

            <button onClick={() => del(b.id)}>×</button></div></th>)}</tr></thead>
        <tbody>
          <tr className="mh-crow-rank"><td>Rank</td>{builds.map(b => <td key={b.id}><span className={"mh-grade sm grade-" + (b.grade || "C")}>{b.grade || "–"}</span></td>)}</tr>
          <tr className="mh-crow-stat"><td>Voto</td>{builds.map(b => <td key={b.id} className={maxOverall > 0 && (b.overall || 0) === maxOverall ? "best" : ""}>{b.overall ?? "–"}</td>)}</tr>
          <tr><td>Offesa</td>{builds.map(b => <td key={b.id}>{b.offense ?? "–"}</td>)}</tr>
          <tr><td>Sopravv.</td>{builds.map(b => <td key={b.id}>{b.survival ?? "–"}</td>)}</tr>
          <tr><td>Comfort</td>{builds.map(b => <td key={b.id}>{b.qol ?? "–"}</td>)}</tr>
          <tr><td>EFR</td>{builds.map(b => <td key={b.id} className={maxEfr > 0 && (b.efr || 0) === maxEfr ? "best" : ""}>{b.efr || "–"}</td>)}</tr>
          <tr className="mh-crow-stat"><td>Difesa</td>{builds.map(b => <td key={b.id} className={b.def === maxDef ? "best" : ""}>{b.def}</td>)}</tr>
          <tr><td>Attacco</td>{builds.map(b => <td key={b.id}>{b.atk || "–"}</td>)}</tr>
          <tr><td>Affinità</td>{builds.map(b => <td key={b.id} style={{ color: (b.aff||0) < 0 ? "#d1603a" : (b.aff||0) > 0 ? "#5fae7f" : "#a2957b" }}>{b.aff ? (b.aff>0?"+":"")+b.aff+"%" : "–"}</td>)}</tr>
          {ELEM.map(([k, label]) => (
            <tr className="mh-crow-res" key={k}><td>{label}</td>
              {builds.map(b => { const v = b.res?.[k] ?? 0; return <td key={b.id} style={{ color: v < 0 ? "#d1603a" : v > 0 ? "#5fae7f" : "#a2957b" }}>{v > 0 ? "+" : ""}{v}</td>; })}</tr>
          ))}
          <tr className="mh-csection"><td colSpan={builds.length + 1}>Abilità</td></tr>
          {names.map(sn => { const top = mx(sn.name); return (
            <tr key={sn.name}><td className="mh-cskill">{sn.name}</td>
              {builds.map(b => { const v = lvl(b, sn.name); return <td key={b.id} className={v > 0 && v === top ? "best" : v === 0 ? "zero" : ""}>{v || "–"}</td>; })}</tr>
          ); })}
        </tbody>
      </table></div>
      <button className="mh-link" onClick={goBuild}>← Torna al costruttore</button>
    </div>
  );
}

/* ------------------------- picker ----------------------------------------- */
/* etichette elemento/stato (i dati usano codici inglesi) + configurazioni di ordinamento */
const ELSTLABEL = { fire:"Fuoco", water:"Acqua", thunder:"Tuono", ice:"Ghiaccio", dragon:"Drago",
  poison:"Veleno", paralysis:"Paralisi", sleep:"Sonno", blastblight:"Esplosione", none:"Nessuno" };
const slotSum = (o) => (o.slots || []).reduce((a, s) => a + s, 0);
const weaponEl = (w) => (w.el && w.el[0]) || (w.st && w.st[0]) || "none";
const WSORT = [
  ["raw", "Attacco ↓", (a, b) => b.raw - a.raw || a.name.localeCompare(b.name)],
  ["aff", "Affinità ↓", (a, b) => b.aff - a.aff || b.raw - a.raw],
  ["rarity", "Rarità ↓", (a, b) => b.rarity - a.rarity || b.raw - a.raw],
  ["slots", "Slot ↓", (a, b) => slotSum(b) - slotSum(a) || b.raw - a.raw],
  ["name", "Nome A-Z", (a, b) => a.name.localeCompare(b.name)],
];
const PSORT = [
  ["name", "Nome A-Z", (a, b) => a.setName.localeCompare(b.setName)],
  ["def", "Difesa ↓", (a, b) => b.def - a.def || a.setName.localeCompare(b.setName)],
  ["slots", "Slot ↓", (a, b) => slotSum(b) - slotSum(a) || a.setName.localeCompare(b.setName)],
];
const cmpOf = (cfg, key) => (cfg.find(s => s[0] === key) || [])[2];

function PiecePicker({ options, value, onChange, data }) {
  const [open, setOpen] = useState(false); const [q, setQ] = useState(""); const [sort, setSort] = useState("name"); const ref = useRef(null);
  useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  const sel = options.find(o => o.id === value); const ql = q.toLowerCase();
  const filtered = useMemo(() => {
    let arr = ql ? options.filter(o => (o.setName + " " + skillsText(o, data)).toLowerCase().includes(ql)) : options.slice();
    const cmp = cmpOf(PSORT, sort); if (cmp) arr = arr.slice().sort(cmp);
    return arr;
  }, [options, q, sort, data]);
  return (
    <div className="mh-picker" ref={ref}>
      <button className="mh-select mh-pickbtn" onClick={() => setOpen(o => !o)}>{sel ? sel.setName : <span className="mh-ph">— vuoto —</span>}<span className="mh-caret">▾</span></button>
      {open && (
        <div className="mh-pickpop">
          <div className="mh-pickctrls">
            <select className="mh-select mh-select-sm" value={sort} onChange={e => setSort(e.target.value)} title="Ordina per">
              {PSORT.map(([k, l]) => <option key={k} value={k}>{l}</option>)}
            </select>
            <input autoFocus className="mh-input mh-picksearch" placeholder="Cerca set o abilità…" value={q} onChange={e => setQ(e.target.value)} />
          </div>
          <div className="mh-picklist">
            <button className="mh-pickitem" onClick={() => { onChange(""); setOpen(false); setQ(""); }}>— vuoto —</button>
            {filtered.slice(0, 200).map(o => (
              <button key={o.id} className={"mh-pickitem" + (o.id === value ? " sel" : "")} onClick={() => { onChange(o.id); setOpen(false); setQ(""); }}>
                <span className="mh-pickname">{o.setName} <em>Dif {o.def}{o.slots.length ? " · slot " + o.slots.join("/") : ""}</em></span>
                <span className="mh-picksk">{skillsText(o, data)}</span></button>
            ))}
            {filtered.length === 0 && <div className="mh-empty" style={{ padding: "8px 10px" }}>Nessun risultato.</div>}
          </div>
        </div>
      )}
    </div>
  );
}
function WeaponPicker({ weapons, value, onChange, data }) {
  const [open, setOpen] = useState(false); const [q, setQ] = useState(""); const [kind, setKind] = useState(""); const [elem, setElem] = useState(""); const [sort, setSort] = useState("raw"); const ref = useRef(null);
  useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  const sel = weapons.find(w => w.id === value); const ql = q.toLowerCase();
  const kinds = useMemo(() => Array.from(new Set(weapons.filter(w => w.id !== "w0").map(w => w.kind))), [weapons]);
  const elems = useMemo(() => {
    const s = new Set(); weapons.forEach(w => { if (w.id !== "w0") s.add(weaponEl(w)); });
    return [...s].sort((a, b) => a === "none" ? 1 : b === "none" ? -1 : (ELSTLABEL[a] || a).localeCompare(ELSTLABEL[b] || b));
  }, [weapons]);
  const filtered = useMemo(() => {
    let arr = weapons.filter(w => w.id !== "w0" && (!kind || w.kind === kind) && (!elem || weaponEl(w) === elem) && (!ql || w.name.toLowerCase().includes(ql)));
    const cmp = cmpOf(WSORT, sort); if (cmp) arr = arr.slice().sort(cmp);
    return arr;
  }, [weapons, kind, elem, sort, q]);
  return (
    <div className="mh-picker" ref={ref}>
      <button className="mh-select mh-pickbtn" onClick={() => setOpen(o => !o)}>{sel && sel.id !== "w0" ? sel.name : <span className="mh-ph">— nessuna arma —</span>}<span className="mh-caret">▾</span></button>
      {open && (

          </div>
          <div className="mh-picklist">

            {filtered.slice(0, 200).map(w => {
              const dmg = w.el || w.st;
              return (
                <button key={w.id} className={"mh-pickitem" + (w.id === value ? " sel" : "")} onClick={() => { onChange(w.id); setOpen(false); setQ(""); }}>

}
function DecoPicker({ options, value, onChange, data, size }) {

/* Editor abilità manuali: aggiunge coppie [abilità, livello] a un elenco.
   Usato per i charm con abilità casuali e per le abilità delle armi Artian. */
function ManualSkills({ data, entries, onChange }) {
  const [open, setOpen] = useState(false); const [q, setQ] = useState(""); const ref = useRef(null);
  useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  const all = useMemo(() => Object.entries(data.skills).map(([id, s]) => ({ id, name: s.name, max: s.max })).sort((a, b) => a.name.localeCompare(b.name)), [data]);
  const has = new Set(entries.map(e => String(e[0]))); const ql = q.toLowerCase();
  const filtered = all.filter(s => !has.has(String(s.id)) && (!ql || s.name.toLowerCase().includes(ql)));
  const addSkill = (s) => { onChange([...entries, [isNaN(Number(s.id)) ? s.id : Number(s.id), 1]]); setQ(""); setOpen(false); };
  const setLvl = (idx, lvl) => { const max = data.skills[entries[idx][0]]?.max || 99; const v = Math.max(1, Math.min(max, lvl)); onChange(entries.map((e, i) => i === idx ? [e[0], v] : e)); };
  const remove = (idx) => onChange(entries.filter((_, i) => i !== idx));
  return (
    <div className="mh-manual">
      {entries.length > 0 && (
        <div className="mh-manual-list">
          {entries.map((e, idx) => { const m = data.skills[e[0]] || { name: e[0], max: 1 };
            return (
              <div className="mh-manual-row" key={idx}>
                <span className="mh-manual-name">{m.name}</span>
                <span className="mh-stepper">
                  <button onClick={() => setLvl(idx, e[1] - 1)} disabled={e[1] <= 1}>−</button>
                  <b>{e[1]}</b><i>/{m.max}</i>
                  <button onClick={() => setLvl(idx, e[1] + 1)} disabled={e[1] >= m.max}>+</button>
                </span>
                <button className="mh-manual-x" onClick={() => remove(idx)}>×</button>
              </div>
            );
          })}
        </div>
      )}
      <div className="mh-picker" ref={ref}>
        <button className="mh-manual-add" onClick={() => setOpen(o => !o)}>＋ Aggiungi abilità</button>
        {open && (
          <div className="mh-pickpop">
            <input autoFocus className="mh-input mh-picksearch" placeholder="Cerca abilità…" value={q} onChange={e => setQ(e.target.value)} />
            <div className="mh-picklist">
              {filtered.slice(0, 200).map(s => (
                <button key={s.id} className="mh-pickitem" onClick={() => addSkill(s)}>
                  <span className="mh-pickname">{s.name} <em>max {s.max}</em></span></button>
              ))}
              {filtered.length === 0 && <div className="mh-empty" style={{ padding: "8px 10px" }}>Nessun risultato.</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* Modifica manuale dei valori "rollati" di un'arma Artian: attacco, affinità,
   elemento/stato, slot e abilità. Gli override vivono in lo.wmods. */
function WeaponMods({ data, weapon, wmods, onPatch, onSlots, onSkills }) {
  const [open, setOpen] = useState(false);
  const m = wmods || {};
  const baseType = weapon.el ? codeFromLabel(weapon.el[0]) : weapon.st ? codeFromLabel(weapon.st[0]) : "none";
  const curType = m.dmgType !== undefined ? m.dmgType : baseType;
  const curVal = m.dmgVal !== undefined ? m.dmgVal : (weapon.el ? weapon.el[1] : weapon.st ? weapon.st[1] : 0);
  const slotsStr = (m.slots != null ? m.slots : weapon.slots || []).join(",");
  const numOr = (v) => v === "" ? undefined : Number(v);
  return (
    <div className="mh-artian">
      <button className="mh-artian-toggle" onClick={() => setOpen(o => !o)}>{open ? "▾" : "▸"} Valori manuali / Artian</button>
      {open && (
        <div className="mh-artian-body">
          <div className="mh-artian-grid">
            <label>Attacco<input type="number" value={m.raw ?? weapon.raw} onChange={e => onPatch({ raw: numOr(e.target.value) })} /></label>
            <label>Affinità %<input type="number" value={m.aff ?? weapon.aff} onChange={e => onPatch({ aff: numOr(e.target.value) })} /></label>
            <label>Slot<input value={slotsStr} placeholder="es. 3,1,1" onChange={e => onSlots(parseSlots(e.target.value))} /></label>
            <label>Elemento / Stato
              <select value={curType} onChange={e => onPatch({ dmgType: e.target.value })}>
                <option value="none">Nessuno</option>
                {WDMG.map(([c, l]) => <option key={c} value={c}>{l}</option>)}
              </select>
            </label>
            <label>Valore<input type="number" value={curVal} disabled={curType === "none"} onChange={e => onPatch({ dmgVal: Number(e.target.value) || 0 })} /></label>
          </div>
          <div className="mh-manual-h">Abilità arma</div>
          <ManualSkills data={data} entries={m.skills || []} onChange={onSkills} />
        </div>
      )}
    </div>
  );
}

.mh-empty{font-size:13px;color:var(--muted);font-style:italic;margin:2px 0 10px;} .mh-empty.big{padding:40px 10px;text-align:center;font-size:15px;}
.mh-summary{background:linear-gradient(180deg,#1c160e,#161009);border:1px solid var(--line);border-radius:12px;padding:17px 15px;}
@media(min-width:880px){.mh-summary{position:sticky;top:14px;}}
.mh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:11px;}
.mh-stat{background:#0f0b07;border:1px solid var(--line);border-radius:9px;padding:11px 6px;text-align:center;}
.mh-stat-n{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:28px;line-height:1;color:var(--gold);} .mh-stat-sub{font-size:14px;color:var(--muted);}
.mh-stat-l{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.mh-wstats{display:flex;flex-wrap:wrap;gap:12px;background:#0f0b07;border:1px solid var(--line);border-radius:8px;padding:8px 11px;margin-bottom:12px;font-size:12.5px;color:var(--muted);}
.mh-wstats b{color:var(--bone);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;margin-left:3px;}
.mh-res{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:15px;}
.mh-res-cell{text-align:center;background:#0f0b07;border:1px solid var(--line);border-radius:7px;padding:6px 2px;}
.mh-res-dot{display:inline-block;width:7px;height:7px;border-radius:50%;}
.mh-res-l{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:3px 0 1px;}
.mh-res-v{display:block;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;}
.mh-bonuses{margin-bottom:15px;}
.mh-bonus{background:#0f0b07;border:1px solid var(--line);border-left:3px solid var(--jade);border-radius:6px;padding:7px 10px;margin-bottom:6px;font-size:12.5px;line-height:1.4;}
.mh-bonus b{color:var(--bone);} .mh-bonus-src{color:var(--muted);font-size:11px;} .mh-bonus-d{color:var(--muted);}
.mh-bonus-gold{border-left-color:var(--gold);} .mh-bonus-gold b{color:var(--gold);}
.mh-bonus-locked{border-left-color:#4a4030;} .mh-bonus-locked b{color:var(--muted);}
.mh-bonus-hd{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px;}
.mh-bonus-ths{margin-top:6px;display:flex;flex-direction:column;gap:4px;}
.mh-bonus-th{display:flex;gap:8px;font-size:11.5px;line-height:1.35;}
.mh-bonus-thn{flex:none;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.03em;white-space:nowrap;}
.mh-bonus-th.on{color:var(--bone);} .mh-bonus-th.on .mh-bonus-thn{color:var(--jade);}
.mh-bonus-th.off{color:#6b5f49;} .mh-bonus-th.off .mh-bonus-thn{color:#6b5f49;}
.mh-skilllist{display:flex;flex-direction:column;gap:8px;}
.mh-skill{cursor:pointer;}
.mh-skill-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.mh-skill-name{font-size:13.5px;} .mh-skill-name.capped{color:var(--gold);text-shadow:0 0 8px rgba(240,176,62,.25);}
.mh-skill-lv{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;} .mh-skill-max{color:var(--muted);font-weight:600;}
.mh-over{color:var(--ember);font-size:10px;font-weight:600;margin-left:7px;}
.mh-pips{display:flex;gap:3px;} .mh-pip{flex:1;height:7px;border-radius:2px;background:#2a2114;border:1px solid #342810;}
.mh-pip.on{background:var(--gold-dim);border-color:var(--gold-dim);}
.mh-pip.on.full{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px rgba(240,176,62,.5);}
.mh-pips[data-cat="def"] .mh-pip.on{background:#4d7d8a;border-color:#4d7d8a;} .mh-pips[data-cat="def"] .mh-pip.on.full{background:#6bb8c9;border-color:#6bb8c9;box-shadow:0 0 6px rgba(107,184,201,.5);}
.mh-pips[data-cat="util"] .mh-pip.on{background:#7a8a4d;border-color:#7a8a4d;} .mh-pips[data-cat="util"] .mh-pip.on.full{background:#a7c96b;border-color:#a7c96b;box-shadow:0 0 6px rgba(167,201,107,.5);}
.mh-skill-desc{margin-top:6px;font-size:12px;color:var(--muted);line-height:1.5;background:#0f0b07;border:1px solid var(--line);border-radius:6px;padding:7px 9px;}
.mh-save{display:flex;gap:7px;margin-top:16px;}
.mh-input{flex:1;background:#0f0b07;border:1px solid var(--line);border-radius:7px;color:var(--bone);padding:8px 10px;font-size:13px;font-family:inherit;}
.mh-input:focus{outline:2px solid var(--gold);border-color:var(--gold);}
.mh-btn{background:var(--gold);color:#1a1207;border:none;border-radius:7px;padding:8px 15px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:12.5px;cursor:pointer;}
.mh-btn:hover{background:#ffc24d;}
.mh-saved{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px;}
.mh-chip{display:inline-flex;align-items:center;gap:3px;background:#0f0b07;border:1px solid var(--line);color:var(--bone);font-size:12px;padding:2px 6px 2px 4px;border-radius:16px;}
.mh-chip-name{background:transparent;border:none;color:var(--bone);cursor:pointer;font-size:12px;font-family:inherit;padding:2px 6px;border-radius:12px;}
.mh-chip-name:hover:not(:disabled){color:var(--gold);background:#1a140d;}
.mh-chip-name:disabled{color:var(--muted);cursor:default;opacity:.55;}
.mh-chip-x{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0 2px;} .mh-chip-x:hover{color:var(--ember);}
.mh-cbuild .mh-cload{background:transparent;border:none;color:var(--bone);font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;font-size:14px;padding:0;}
.mh-cbuild .mh-cload:hover{color:var(--gold);text-decoration:underline;}
.mh-link{background:transparent;border:none;color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:12px;cursor:pointer;padding:3px 4px;}
.mh-compare{max-width:1140px;margin:0 auto;padding:18px;}
.mh-ctablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;}
.mh-ctable{border-collapse:collapse;width:100%;min-width:420px;}
.mh-ctable th,.mh-ctable td{padding:8px 12px;text-align:center;border-bottom:1px solid #241c11;font-size:13px;}
.mh-ctable thead th{background:#0f0b07;position:sticky;top:0;}
.mh-ccorner{text-align:left!important;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);font-size:11px;}
.mh-cbuild{display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--bone);}
.mh-cbuild button{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:15px;} .mh-cbuild button:hover{color:var(--ember);}
.mh-ctable td:first-child,.mh-cskill{text-align:left!important;color:var(--muted);}
.mh-crow-stat td{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bone);}
.mh-csection td{background:#0f0b07;text-align:left;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dim);font-size:11px;}
.mh-ctable td.best{color:var(--gold);font-weight:700;background:rgba(240,176,62,.08);} .mh-ctable td.zero{color:#4a4030;}
.mh-loading{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);text-align:center;padding:0 20px;}
.mh-loading p{font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--bone);margin:0;}
.mh-loading-sub{font-size:12px;max-width:340px;}
.mh-footer{max-width:1140px;margin:6px auto 0;padding:14px 18px 0;font-size:11.5px;color:var(--muted);line-height:1.6;border-top:1px solid var(--line);}
/* --- valutazione build --- */
.mh-score{display:flex;gap:12px;align-items:stretch;background:#0f0b07;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px;}
.mh-grade{flex:none;width:62px;display:grid;place-items:center;border-radius:9px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:38px;line-height:1;border:1px solid var(--line);}
.mh-grade.sm{width:30px;height:30px;font-size:17px;margin:0 auto;}
.grade-S{color:#f0b03e;border-color:#b5832b;background:radial-gradient(circle at 50% 35%,rgba(240,176,62,.28),transparent 70%);text-shadow:0 0 12px rgba(240,176,62,.6);}
.grade-A{color:#5fae7f;border-color:#33513f;background:radial-gradient(circle at 50% 35%,rgba(95,174,127,.22),transparent 70%);}
.grade-B{color:#6bb8c9;border-color:#33505a;background:radial-gradient(circle at 50% 35%,rgba(107,184,201,.18),transparent 70%);}
.grade-C{color:#c9a86b;border-color:#5a4a2e;}
.grade-D{color:#a2957b;border-color:var(--line);}
.mh-score-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px;justify-content:center;}
.mh-score-bars{display:flex;flex-direction:column;gap:5px;}
.mh-sbar{display:flex;align-items:center;gap:8px;}
.mh-sbar-l{flex:none;width:60px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.mh-sbar-track{flex:1;height:8px;background:#2a2114;border:1px solid #342810;border-radius:5px;overflow:hidden;}
.mh-sbar-fill{height:100%;border-radius:5px;transition:width .25s;}
.mh-sbar-fill.off{background:linear-gradient(90deg,#b5832b,#f0b03e);}
.mh-sbar-fill.surv{background:linear-gradient(90deg,#3d6d5a,#6bb8c9);}
.mh-sbar-fill.qol{background:linear-gradient(90deg,#5a4a8a,#9a6fc9);}
.mh-sbar-v{flex:none;width:24px;text-align:right;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--bone);}
.mh-score-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;color:var(--muted);}
.mh-score-meta b{color:var(--bone);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;margin-left:2px;}
.mh-score-notes{display:flex;flex-wrap:wrap;gap:5px;}
.mh-score-notes span{font-size:10.5px;color:var(--gold-dim);background:#1a140d;border:1px solid var(--line);border-radius:12px;padding:1px 8px;}
.mh-crow-rank td{padding-top:10px;padding-bottom:6px;}
/* --- livelli abilità --- */
.mh-skill-flavor{margin-bottom:6px;}
.mh-lvls{display:flex;flex-direction:column;gap:3px;}
.mh-lvl{display:flex;gap:8px;align-items:baseline;padding:3px 6px;border-radius:5px;font-size:11.5px;color:var(--muted);}
.mh-lvl.done{color:#8f8261;}
.mh-lvl.cur{background:rgba(240,176,62,.1);color:var(--bone);border:1px solid var(--gold-dim);}
.mh-lvl-n{flex:none;width:34px;font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold-dim);}
.mh-lvl.cur .mh-lvl-n{color:var(--gold);}
.mh-lvl-d{flex:1;line-height:1.35;}
/* --- input manuale (charm / Artian) --- */
.mh-manual-wrap{margin-top:10px;border-top:1px solid var(--line);padding-top:9px;}
.mh-manual-h{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dim);margin:0 0 7px;}
.mh-manual-list{display:flex;flex-direction:column;gap:5px;margin-bottom:7px;}
.mh-manual-row{display:flex;align-items:center;gap:8px;background:#0f0b07;border:1px solid var(--line);border-radius:7px;padding:4px 6px 4px 10px;}
.mh-manual-name{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mh-stepper{display:flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--muted);}
.mh-stepper b{color:var(--bone);font-weight:700;min-width:12px;text-align:center;} .mh-stepper i{font-style:normal;font-size:11px;}
.mh-stepper button{width:22px;height:22px;line-height:1;background:#1a140d;border:1px solid var(--line);color:var(--gold);border-radius:5px;cursor:pointer;font-size:15px;font-weight:700;padding:0;}
.mh-stepper button:hover:not(:disabled){border-color:var(--gold-dim);} .mh-stepper button:disabled{opacity:.35;cursor:default;}
.mh-manual-x{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;padding:0 3px;} .mh-manual-x:hover{color:var(--ember);}
.mh-manual-add{width:100%;background:#0f0b07;border:1px dashed var(--gold-dim);color:var(--gold);border-radius:7px;padding:7px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
.mh-manual-add:hover{background:#1a140d;border-style:solid;}
.mh-artian{margin-top:9px;border-top:1px solid var(--line);padding-top:8px;}
.mh-artian-toggle{width:100%;text-align:left;background:transparent;border:none;color:var(--gold-dim);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;padding:2px 0;}
.mh-artian-toggle:hover{color:var(--gold);}
.mh-artian-body{margin-top:9px;}
.mh-artian-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;}
.mh-artian-grid label{display:flex;flex-direction:column;gap:3px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.mh-artian-grid label:nth-child(3){grid-column:1 / -1;}
.mh-artian-grid input,.mh-artian-grid select{background:#0f0b07;border:1px solid var(--line);border-radius:6px;color:var(--bone);padding:7px 8px;font-size:13px;font-family:inherit;width:100%;appearance:none;}
.mh-artian-grid input:focus,.mh-artian-grid select:focus{outline:2px solid var(--gold);border-color:var(--gold);}
.mh-artian-grid input:disabled{opacity:.4;}
.mh-trk{max-width:820px;margin:0 auto;padding:0 4px;}
.mh-trk-head{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mh-trk-prog{flex:1;min-width:200px;}
.mh-trk-progbar{height:9px;background:#2a2114;border:1px solid #342810;border-radius:5px;overflow:hidden;}
.mh-trk-progfill{height:100%;background:linear-gradient(90deg,#3d6d4a,#5fae7f);border-radius:5px;transition:width .25s;}
.mh-trk-progl{display:block;margin-top:5px;font-size:11.5px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.04em;}
.mh-trk-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--muted);}
.mh-trk-meta b{color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;margin-left:3px;}
.mh-trk-note{font-size:11.5px;color:var(--muted);line-height:1.55;margin:0 0 12px;}
.mh-mattable{border-collapse:collapse;width:100%;table-layout:fixed;}
.mh-mattable th,.mh-mattable td{padding:8px 8px;text-align:center;border-bottom:1px solid #241c11;font-size:13px;overflow-wrap:anywhere;}
.mh-mattable thead th{background:#0f0b07;position:sticky;top:0;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dim);font-size:11px;}
.mh-mattable th:nth-child(2),.mh-mattable td:nth-child(2){width:52px;}
.mh-mattable th:nth-child(3),.mh-mattable td:nth-child(3){width:120px;}
.mh-mattable th:nth-child(4),.mh-mattable td:nth-child(4){width:56px;}
.mh-mattable th.mh-ccorner,.mh-matname{text-align:left!important;}
.mh-matname{vertical-align:middle;color:var(--bone);}
.mh-matname-in{display:flex;align-items:center;gap:9px;min-width:0;line-height:1.35;}
.mh-matname-t{min-width:0;}
.mh-mattable td{vertical-align:middle;}
.mh-matdot{width:11px;height:11px;border-radius:50%;flex:none;border:1px solid rgba(0,0,0,.4);box-shadow:0 0 0 1px rgba(255,255,255,.06);}
.mh-matcheck{color:#5fae7f;font-weight:700;margin-left:2px;}
.mh-matneed{font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--bone);font-variant-numeric:tabular-nums;}
.mh-matinput{width:42px;background:#0f0b07;border:1px solid var(--line);border-radius:5px;color:var(--bone);text-align:center;padding:4px 2px;font-size:13px;font-family:inherit;appearance:textfield;font-variant-numeric:tabular-nums;}
.mh-matinput::-webkit-outer-spin-button,.mh-matinput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.mh-mattable td .mh-stepper{justify-content:center;gap:4px;}
.mh-matrem{color:var(--ember);font-family:'Rajdhani',sans-serif;font-weight:700;font-variant-numeric:tabular-nums;}
.mh-matok{color:#4a4030;}
.mh-mattable tr.matdone .mh-matname{color:var(--muted);}
.mh-mattable tr.matdone{background:rgba(95,174,127,.06);}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
