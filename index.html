.mh-lvl.done{color:#8f8261;}
.mh-lvl.cur{background:rgba(240,176,62,.1);color:var(--bone);border:1px solid var(--gold-dim);}
.mh-lvl-n{flex:none;width:34px;font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold-dim);}
.mh-lvl.cur .mh-lvl-n{color:var(--gold);}
.mh-lvl-d{flex:1;line-height:1.35;}
/* --- input manuale (charm / Artian) --- */
.mh-manual-wrap{margin-top:10px;border-top:1px solid var(--line);padding-top:9px;}
.mh-manual-h{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dim);margin:0 0 7px;}
.mh-manual-list{display:flex;flex-direction:column;gap:5px;margin-bottom:7px;}
.mh-manual-row{display:flex;align-items:center;gap:8px;background:#0f0b07;border:1px solid var(--line);border-radius:7px;padding:4px 6px 4px 10px;}
.mh-manual-name{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mh-stepper{display:flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--muted);}
.mh-stepper b{color:var(--bone);font-weight:700;min-width:12px;text-align:center;} .mh-stepper i{font-style:normal;font-size:11px;}
.mh-stepper button{width:22px;height:22px;line-height:1;background:#1a140d;border:1px solid var(--line);color:var(--gold);border-radius:5px;cursor:pointer;font-size:15px;font-weight:700;padding:0;}
.mh-stepper button:hover:not(:disabled){border-color:var(--gold-dim);} .mh-stepper button:disabled{opacity:.35;cursor:default;}
.mh-manual-x{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;padding:0 3px;} .mh-manual-x:hover{color:var(--ember);}
.mh-manual-add{width:100%;background:#0f0b07;border:1px dashed var(--gold-dim);color:var(--gold);border-radius:7px;padding:7px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
.mh-manual-add:hover{background:#1a140d;border-style:solid;}
.mh-artian{margin-top:9px;border-top:1px solid var(--line);padding-top:8px;}
.mh-artian-toggle{width:100%;text-align:left;background:transparent;border:none;color:var(--gold-dim);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;padding:2px 0;}
.mh-artian-toggle:hover{color:var(--gold);}
.mh-artian-body{margin-top:9px;}
.mh-artian-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;}
.mh-artian-grid label{display:flex;flex-direction:column;gap:3px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.mh-artian-grid label:nth-child(3){grid-column:1 / -1;}
.mh-artian-grid input,.mh-artian-grid select{background:#0f0b07;border:1px solid var(--line);border-radius:6px;color:var(--bone);padding:7px 8px;font-size:13px;font-family:inherit;width:100%;appearance:none;}
.mh-artian-grid input:focus,.mh-artian-grid select:focus{outline:2px solid var(--gold);border-color:var(--gold);}
.mh-artian-grid input:disabled{opacity:.4;}
.mh-trk{max-width:820px;margin:0 auto;padding:0 4px;}
.mh-trk-head{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mh-trk-prog{flex:1;min-width:200px;}
.mh-trk-progbar{height:9px;background:#2a2114;border:1px solid #342810;border-radius:5px;overflow:hidden;}
.mh-trk-progfill{height:100%;background:linear-gradient(90deg,#5c7a3c,var(--sage));border-radius:5px;transition:width .25s;}
.mh-trk-progl{display:block;margin-top:5px;font-size:11.5px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.04em;}
.mh-trk-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--muted);}
.mh-trk-meta b{color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;margin-left:3px;}
.mh-trk-note{font-size:11.5px;color:var(--muted);line-height:1.55;margin:0 0 12px;}
.mh-mattable{border-collapse:collapse;width:100%;table-layout:fixed;}
.mh-mattable th,.mh-mattable td{padding:8px 8px;text-align:center;border-bottom:1px solid #241c11;font-size:13px;overflow-wrap:anywhere;}
.mh-mattable thead th{background:#120d08;position:sticky;top:0;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);font-size:11px;border-bottom:2px solid var(--gold-dim);}
.mh-mattable th:nth-child(2),.mh-mattable td:nth-child(2){width:52px;}
.mh-mattable th:nth-child(3),.mh-mattable td:nth-child(3){width:120px;}
.mh-mattable th:nth-child(4),.mh-mattable td:nth-child(4){width:56px;}
.mh-mattable th.mh-ccorner,.mh-matname{text-align:left!important;}
.mh-matname{vertical-align:middle;color:var(--bone);}
.mh-matname-in{display:flex;align-items:center;gap:9px;min-width:0;line-height:1.35;}
.mh-matname-t{min-width:0;}
.mh-mattable td{vertical-align:middle;}
.mh-matdot{width:11px;height:11px;border-radius:50%;flex:none;border:1px solid rgba(0,0,0,.4);box-shadow:0 0 0 1px rgba(255,255,255,.06);}
.mh-matcheck{color:var(--sage);font-weight:700;margin-left:2px;}
.mh-matneed{font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--bone);font-variant-numeric:tabular-nums;}
.mh-matinput{width:42px;background:#0f0b07;border:1px solid var(--line);border-radius:5px;color:var(--bone);text-align:center;padding:4px 2px;font-size:13px;font-family:inherit;appearance:textfield;font-variant-numeric:tabular-nums;}
.mh-matinput::-webkit-outer-spin-button,.mh-matinput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.mh-mattable td .mh-stepper{justify-content:center;gap:4px;}
.mh-matrem{color:var(--ember);font-family:'Rajdhani',sans-serif;font-weight:700;font-variant-numeric:tabular-nums;}
.mh-matok{color:#4a4030;}
.mh-mattable tr.matdone .mh-matname{color:var(--muted);}
.mh-mattable tr.matdone{background:rgba(156,181,115,.07);}
.mh-matgroup{margin-bottom:18px;}
.mh-matgroup-h{display:flex;align-items:center;gap:10px;margin:0 0 8px;padding:0 2px;}
.mh-matgroup-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:.04em;color:var(--bone);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mh-matgroup-meta{margin-left:auto;flex:none;font-size:11px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.03em;}
.mh-trk-foot{display:flex;gap:16px;align-items:center;margin-top:8px;}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
