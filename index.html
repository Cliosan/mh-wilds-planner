<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MH Wilds — Pianificatore di Build</title>
  <style>
    html,body{margin:0;background:#14100b;} #root{min-height:100vh;}
    #diag{color:#ece1cb;font-family:-apple-system,'Segoe UI',sans-serif;padding:28px;max-width:720px;margin:0 auto;line-height:1.6;}
    #diag h2{color:#f0b03e;} #diag code{background:#1e1810;padding:2px 6px;border-radius:4px;color:#f0b03e;}
    #diag .ok{color:#5fae7f;} #diag .bad{color:#d1603a;}
  </style>
  <!-- React + Babel da CDN (jsDelivr). onerror registra i fallimenti di caricamento. -->
  <script>window.__cdn = { react:false, reactDom:false, babel:false, errors:[] };</script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"
    onload="window.__cdn.react=true" onerror="window.__cdn.errors.push('react')"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"
    onload="window.__cdn.reactDom=true" onerror="window.__cdn.errors.push('react-dom')"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"
    onload="window.__cdn.babel=true" onerror="window.__cdn.errors.push('babel')"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Rilevatore: se dopo 2s il root è vuoto, mostra a schermo cosa non ha funzionato. -->
  <script>
    window.addEventListener("error", function (e) {
      var msg = (e && (e.message || (e.error && e.error.message))) || String(e);
      var src = (e && e.filename) ? " @ " + e.filename : "";
      window.__lastError = msg + src;
    });
    setTimeout(function () {
      var root = document.getElementById("root");
      if (root && root.childElementCount > 0) return; // app montata: tutto ok
      var c = window.__cdn || {};
      var line = function (label, ok) { return '<li>' + label + ': <span class="' + (ok ? 'ok">✓ caricato' : 'bad">✗ NON caricato') + '</span></li>'; };
      root.innerHTML =
        '<div id="diag"><h2>Diagnostica avvio</h2>' +
        '<p>L\'app non si è montata. Stato del caricamento delle librerie da CDN:</p><ul>' +
        line('React', c.react) + line('ReactDOM', c.reactDom) + line('Babel', c.babel) +
        '</ul>' +
        (window.__lastError ? '<p class="bad">Errore JavaScript: <code>' + window.__lastError + '</code></p>' : '') +
        (c.errors && c.errors.length ? '<p class="bad">Script bloccati: ' + c.errors.join(', ') + '</p>' : '') +
        '<p>Se una libreria è ✗, è la rete/estensione che blocca il CDN. Se sono tutte ✓ ma vedi un errore JavaScript, è un bug nel codice.</p></div>';
    }, 2500);
  </script>

  <script type="text/babel" data-presets="react">
/* ==========================================================================
   MONSTER HUNTER WILDS — PIANIFICATORE DI BUILD
   --------------------------------------------------------------------------
   Versione locale a file singolo. I dati vengono scaricati dall'API ufficiale
   MHDB Wilds (https://wilds.mhdb.io, in italiano) e memorizzati in localStorage:
   dalla seconda apertura l'app funziona offline con l'intero database.
   Se non c'è né cache né rete, si usa il piccolo campione di riserva (SAMPLE).
   Le build salvate persistono tra le sessioni.
   ========================================================================== */

const { useState, useEffect, useMemo, useRef } = React;

/* ---- shim: window.storage (API Artifacts) -> localStorage ---------------- */
window.storage = window.storage || {
  async get(key) { const v = localStorage.getItem(key); return v == null ? null : { value: v }; },
  async set(key, value) { localStorage.setItem(key, value); },
};

const API = "https://wilds.mhdb.io/it";
const DB_KEY = "mhw_db_v3"; // v3: aggiunge le descrizioni per-livello delle abilità
const BUILDS_KEY = "mhw_builds_v2";

const ELEM = [["f","Fuoco","#d1603a"],["w","Acqua","#4a90c9"],["t","Tuono","#e0b83c"],["i","Ghiaccio","#6bb8c9"],["d","Drago","#9a6fc9"]];
const SLOTS = ["head","chest","arms","waist","legs"];
const SLOT_LABEL = { weapon:"Arma", head:"Testa", chest:"Busto", arms:"Braccia", waist:"Vita", legs:"Gambe" };
const ICONS = { head:"⛑", chest:"🛡", arms:"🥊", waist:"⛓", legs:"👢" };
const RESMAP = { fire:"f", water:"w", thunder:"t", ice:"i", dragon:"d" };
const WKINDS = { "great-sword":"Spadone","long-sword":"Katana","sword-shield":"Spada e scudo","dual-blades":"Doppie lame",
  "hammer":"Martello","hunting-horn":"Corno da caccia","lance":"Lancia","gunlance":"Lanciacannone","switch-axe":"Spadascia",
  "charge-blade":"Spada caricata","insect-glaive":"Falcione insetto","bow":"Arco","light-bowgun":"Balestra leggera","heavy-bowgun":"Balestra pesante" };

/* ---- elementi/stati per la modifica manuale delle armi Artian ------------ */
const WDMG = [["fire","Fuoco"],["water","Acqua"],["thunder","Tuono"],["ice","Ghiaccio"],["dragon","Drago"],
  ["poison","Veleno"],["paralysis","Paralisi"],["sleep","Sonno"],["blast","Esplosione"]];
const DMG_LABEL = Object.fromEntries(WDMG);
const STATUS_TYPES = new Set(["poison","paralysis","sleep","blast"]);
const codeFromLabel = (lbl) => { for (const [c, l] of WDMG) if (l === lbl || c === lbl) return c; return "none"; };
const parseSlots = (str) => (str || "").split(/[^0-9]+/).filter(Boolean).map(Number).filter(n => n >= 1 && n <= 3);

/* Applica al pezzo-arma di base gli override manuali (stat + abilità Artian).
   Non muta l'originale: restituisce una copia con i valori effettivi. */
function effectiveWeapon(w, wmods) {
  if (!w) return w;
  const m = wmods || {};
  const out = { ...w };
  if (m.raw != null && m.raw !== "") out.raw = Number(m.raw);
  if (m.aff != null && m.aff !== "") out.aff = Number(m.aff);
  if (m.slots != null) out.slots = m.slots;
  if (m.dmgType !== undefined) {
    const val = Number(m.dmgVal) || 0;
    if (m.dmgType === "none" || m.dmgType === "") { out.el = null; out.st = null; }
    else if (STATUS_TYPES.has(m.dmgType)) { out.st = [DMG_LABEL[m.dmgType] || m.dmgType, val]; out.el = null; }
    else { out.el = [DMG_LABEL[m.dmgType] || m.dmgType, val]; out.st = null; }
  }
  out.skills = [...(w.skills || []), ...((m.skills) || [])];
  return out;
}

/* ---- riserva minima (se manca sia cache che rete) ------------------------ */
const SAMPLE = {
  source:"sample",
  skills:{ 57:{name:"Sfrutta Debolezza",cat:"off",max:5,desc:"Aumenta l'affinità sui punti deboli e sulle ferite."},
    22:{name:"Potenzia Critico",cat:"off",max:5,desc:"Aumenta il danno dei colpi critici."},
    144:{name:"Provocatore",cat:"off",max:5,desc:"Aumenta attacco e affinità quando il mostro è infuriato."},
    122:{name:"Benedizione Divina",cat:"def",max:3,desc:"Ha una probabilità di ridurre i danni subiti."},
    14:{name:"Costituzione",cat:"util",max:5,desc:"Riduce il consumo di stamina."} },
  bonuses:{ 106:{name:"Tirannia di Gore Magala",kind:"set",thresholds:[{pieces:2,desc:"Eclissi Nera I"},{pieces:4,desc:"Eclissi Nera II"}]},
    131:{name:"Anima del Signore",kind:"group",thresholds:[{pieces:3,desc:"Tenacia: sopravvivi a un colpo letale."}]} },
  pieces:[
    {id:"s_h",set:1,setName:"Esempio",slot:"head",rank:"high",def:60,res:{f:0,w:0,t:0,i:0,d:0},slots:[3,1],skills:[[57,2]],bonuses:[]},
    {id:"s_c",set:1,setName:"Esempio",slot:"chest",rank:"high",def:60,res:{f:0,w:0,t:0,i:0,d:0},slots:[3],skills:[[22,2]],bonuses:[]},
    {id:"s_a",set:1,setName:"Esempio",slot:"arms",rank:"high",def:60,res:{f:0,w:0,t:0,i:0,d:0},slots:[2,1],skills:[[144,2]],bonuses:[]},
    {id:"s_w",set:1,setName:"Esempio",slot:"waist",rank:"high",def:60,res:{f:0,w:0,t:0,i:0,d:0},slots:[2],skills:[[14,2]],bonuses:[]},
    {id:"s_l",set:1,setName:"Esempio",slot:"legs",rank:"high",def:60,res:{f:0,w:0,t:0,i:0,d:0},slots:[2,1],skills:[[122,1]],bonuses:[]},
  ],
  decos:[{id:"d1",name:"Gioiello Debolezza [1]",size:1,kind:"armor",skills:[[57,1]]},
    {id:"d2",name:"Gioiello Critico [1]",size:1,kind:"armor",skills:[[22,1]]}],
  charms:[{id:"c0",name:"— Nessun charm —",skills:[]},{id:"c1",name:"Charm Debolezza III",skills:[[57,3]]}],
  weapons:[{id:"w0",kind:"great-sword",name:"— Nessuna arma —",slots:[],skills:[],raw:0,aff:0,el:null,st:null}],
};

/* ---- trasformazione API -> formato interno ------------------------------- */
function transform(skillsRaw, setsRaw, decosRaw, charmsRaw, weaponsRaw) {
  const skills = {}, bonuses = {};
  const catOf = (k) => k === "offense" || k === "attack" || k === "affinity" || k === "element" || k === "ranged" || k === "handicraft" ? "off"
    : k === "defense" || k === "health" ? "def" : "util";
  for (const s of skillsRaw) {
    const isBonus = s.kind === "set" || s.kind === "group" || s.kind === "series" || (s.ranks || []).some(r => r.setPiecesRequired != null);
    if (isBonus) {
      bonuses[s.id] = { name: s.name, kind: s.kind === "group" ? "group" : "set",
        thresholds: (s.ranks || []).filter(r => r.setPiecesRequired != null)
          .map(r => ({ pieces: r.setPiecesRequired, desc: r.name ? `${r.name} — ${r.description || ""}` : (r.description || "") })) };
    } else {
      const rk = (s.ranks || []).filter(r => r.setPiecesRequired == null);
      skills[s.id] = { name: s.name, cat: catOf(s.icon?.kind), max: Math.max(1, ...(rk.length ? rk : [{ level: 1 }]).map(r => r.level || 1)), desc: s.description || "",
        levels: rk.map(r => ({ level: r.level || 1, desc: r.description || "" })).sort((a, b) => a.level - b.level) };
    }
  }
  const pieces = [];
  for (const set of setsRaw || []) {
    for (const p of set.pieces || []) {
      const res = { f:0,w:0,t:0,i:0,d:0 };
      if (p.resistances) for (const [k,v] of Object.entries(p.resistances)) if (RESMAP[k]) res[RESMAP[k]] = v;
      const psk = [], pbn = [];
      for (const ps of p.skills || []) {
        const sid = ps.skill?.id; if (sid == null) continue;
        if (ps.setPiecesRequired != null || ["group","set","series"].includes(ps.skill?.kind)) pbn.push(sid);
        else psk.push([sid, ps.level || 1]);
      }
      pieces.push({ id: "p" + p.id, set: set.id, setName: set.name, slot: p.kind, rank: p.rank,
        def: p.defense?.base ?? 0, res, slots: (p.slots || []).slice(), skills: psk, bonuses: pbn });
    }
  }
  const decos = (decosRaw || []).map(d => ({ id: "d" + d.id, name: d.name, size: d.slot,
    kind: d.kind === "weapon" ? "weapon" : "armor",
    skills: (d.skills || []).map(s => [s.skill?.id, s.level || 1]).filter(x => x[0] != null) })).filter(d => d.skills.length);
  const charms = [{ id: "c0", name: "— Nessun charm —", skills: [] }];
  for (const c of charmsRaw || []) for (const r of c.ranks || [])
    charms.push({ id: "c" + c.id + "_" + r.level, name: r.name, skills: (r.skills || []).map(s => [s.skill?.id, s.level || 1]).filter(x => x[0] != null) });
  const weapons = [{ id: "w0", kind: "great-sword", name: "— Nessuna arma —", slots: [], skills: [], raw: 0, aff: 0, el: null, st: null }];
  for (const w of weaponsRaw || []) {
    let el = null, st = null;
    for (const sp of w.specials || []) {
      if (sp.kind === "element" && sp.element) el = [sp.element, sp.damage?.display ?? sp.damage?.raw ?? 0];
      else if (sp.kind === "status" && sp.status) st = [sp.status, sp.damage?.display ?? sp.damage?.raw ?? 0];
    }
    weapons.push({ id: "w" + w.kind + "_" + w.id, kind: w.kind, name: w.name, slots: (w.slots || []).slice(),
      skills: (w.skills || []).map(s => [s.skill?.id, s.level || 1]).filter(x => x[0] != null),
      raw: w.damage?.raw ?? 0, aff: w.affinity ?? 0, el, st });
  }
  return { source: "live", skills, bonuses, pieces, decos, charms, weapons };
}

/* ========================================================================== */
function App() {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState("Controllo la cache locale…");

  useEffect(() => {
    let alive = true;
    (async () => {
      // 1) cache locale
      try {
        const c = await window.storage.get(DB_KEY);
        if (c && c.value) { const d = JSON.parse(c.value); if (alive) { setData({ ...d, source: "cache" }); return; } }
      } catch (e) {}
      // 2) rete
      setStatus("Scarico il database ufficiale (armature, armi, gioielli, charm, abilità)…");
      try {
        const j = async (u) => { const r = await fetch(u); if (!r.ok) throw new Error(u); return r.json(); };
        const [sk, st, de, ch, we] = await Promise.all([
          j(`${API}/skills`), j(`${API}/armor/sets`), j(`${API}/decorations`), j(`${API}/charms`), j(`${API}/weapons`),
        ]);
        if (!alive) return;
        const d = transform(sk, st, de, ch, we);
        setData(d);
        try { await window.storage.set(DB_KEY, JSON.stringify({ skills:d.skills, bonuses:d.bonuses, pieces:d.pieces, decos:d.decos, charms:d.charms, weapons:d.weapons })); } catch (e) {}
      } catch (e) {
        if (alive) setData(SAMPLE);
      }
    })();
    return () => { alive = false; };
  }, []);

  if (!data) return <Loading status={status} />;
  return <Shell data={data} />;
}

function Loading({ status }) {
  return (
    <div className="mh-root"><style>{CSS}</style>
      <div className="mh-loading"><div className="mh-crest big">◆</div>
        <p>Registro del cacciatore</p><span className="mh-loading-sub">{status}</span></div>
    </div>
  );
}

function Shell({ data }) {
  const [tab, setTab] = useState("build");
  const srcLabel = data.source === "cache" ? `${data.pieces.length} pezzi · ${data.weapons.length - 1} armi · offline`
    : data.source === "live" ? `${data.pieces.length} pezzi · ${data.weapons.length - 1} armi · live`
    : "dati di esempio";
  return (
    <div className="mh-root"><style>{CSS}</style>
      <header className="mh-header">
        <div className="mh-crest">◆</div>
        <div className="mh-titlewrap"><h1>Pianificatore Build</h1><p className="mh-sub">Monster Hunter Wilds</p></div>
        <span className={"mh-badge " + (data.source === "sample" ? "offline" : "live")}>{srcLabel}</span>
      </header>
      <nav className="mh-tabs">
        <button className={tab === "build" ? "on" : ""} onClick={() => setTab("build")}>Costruttore</button>
        <button className={tab === "compare" ? "on" : ""} onClick={() => setTab("compare")}>Confronto</button>
      </nav>
      <Planner data={data} tab={tab} setTab={setTab} />
      {data.source === "sample" && <p className="mh-footer">Non è stato possibile scaricare il database né trovarne una copia locale. Stai usando un piccolo campione. Riapri l'app dove la rete è consentita per scaricare (una volta sola) l'intero database.</p>}
    </div>
  );
}

/* ---------------------------- planner ------------------------------------- */
function emptyLoadout() { return { weapon: "w0", pieces: { head:"", chest:"", arms:"", waist:"", legs:"" }, charm: "c0", decos: {}, wmods: {}, cskills: [] }; }

function Planner({ data, tab, setTab }) {
  const [lo, setLo] = useState(emptyLoadout);
  const [builds, setBuilds] = useState([]);
  const [name, setName] = useState("");

  useEffect(() => { (async () => { try { const r = await window.storage.get(BUILDS_KEY); if (r && r.value) setBuilds(JSON.parse(r.value)); } catch (e) {} })(); }, []);
  const persist = async (next) => { setBuilds(next); try { await window.storage.set(BUILDS_KEY, JSON.stringify(next)); } catch (e) {} };

  const pieceById = useMemo(() => Object.fromEntries(data.pieces.map(p => [p.id, p])), [data]);
  const decoById  = useMemo(() => Object.fromEntries(data.decos.map(d => [d.id, d])), [data]);
  const charmById = useMemo(() => Object.fromEntries(data.charms.map(c => [c.id, c])), [data]);
  const weaponById= useMemo(() => Object.fromEntries(data.weapons.map(w => [w.id, w])), [data]);
  const piecesBySlot = useMemo(() => {
    const m = { head:[], chest:[], arms:[], waist:[], legs:[] };
    for (const p of data.pieces) if (m[p.slot]) m[p.slot].push(p);
    for (const k in m) m[k].sort((a,b) => a.setName.localeCompare(b.setName)); return m;
  }, [data]);

  const result = useMemo(() => compute(lo, { pieceById, decoById, charmById, weaponById, skills: data.skills, bonuses: data.bonuses }), [lo, data, pieceById, decoById, charmById, weaponById]);

  const setPiece = (slot, id) => setLo(l => { const decos = {}; Object.keys(l.decos).forEach(k => { if (!k.startsWith(slot + "#")) decos[k] = l.decos[k]; }); return { ...l, pieces: { ...l.pieces, [slot]: id }, decos }; });
  const setWeapon = (id) => setLo(l => { const decos = {}; Object.keys(l.decos).forEach(k => { if (!k.startsWith("weapon#")) decos[k] = l.decos[k]; }); return { ...l, weapon: id, decos, wmods: {} }; });
  const setCharm = (id) => setLo(l => ({ ...l, charm: id, cskills: [] }));
  const setDeco = (key, id) => setLo(l => ({ ...l, decos: { ...l.decos, [key]: id } }));
  const setWmod = (patch) => setLo(l => ({ ...l, wmods: { ...(l.wmods || {}), ...patch } }));
  const setCSkills = (arr) => setLo(l => ({ ...l, cskills: arr }));
  const setWSlots = (arr) => setLo(l => {
    const base = weaponById[l.weapon];
    const slots = (arr && arr.length) ? arr : undefined;
    const effLen = slots ? slots.length : (base ? base.slots.length : 0);
    const decos = {};
    Object.keys(l.decos).forEach(k => {
      if (!k.startsWith("weapon#")) { decos[k] = l.decos[k]; return; }
      if (Number(k.split("#")[1]) < effLen) decos[k] = l.decos[k];
    });
    return { ...l, decos, wmods: { ...(l.wmods || {}), slots } };
  });
  const reset = () => setLo(emptyLoadout());

  const save = () => {
    const w = weaponById[lo.weapon];
    persist([...builds, { id: "b" + Date.now(), name: name.trim() || `Build ${builds.length + 1}`,
      weapon: w && w.id !== "w0" ? w.name : null, def: result.def, res: result.res,
      atk: result.atk, aff: result.aff,
      grade: result.score.grade, overall: result.score.overall, offense: result.score.offense, survival: result.score.survival, efr: result.score.efr,
      lo: { weapon: lo.weapon, pieces: { ...lo.pieces }, charm: lo.charm, decos: { ...lo.decos }, wmods: { ...(lo.wmods || {}) }, cskills: [...(lo.cskills || [])] },
      skills: result.skills.map(s => ({ name: s.name, level: s.level, cat: s.cat })),
      bonuses: result.activeBonuses.map(b => `${b.name} (${b.have} pz)`) }]);
    setName("");
  };
  const del = (id) => persist(builds.filter(b => b.id !== id));
  const load = (b) => { if (b.lo) { setLo({ weapon: b.lo.weapon || "w0", pieces: { ...emptyLoadout().pieces, ...b.lo.pieces }, charm: b.lo.charm || "c0", decos: { ...b.lo.decos }, wmods: b.lo.wmods ? { ...b.lo.wmods } : {}, cskills: b.lo.cskills ? [...b.lo.cskills] : [] }); setName(b.name); } };

  if (tab === "compare") return <Compare builds={builds} del={del} load={(b) => { load(b); setTab("build"); }} goBuild={() => setTab("build")} />;

  const weapon = weaponById[lo.weapon];
  const weaponEff = effectiveWeapon(weapon, lo.wmods);
  const slotSources = [];
  if (weaponEff && weaponEff.slots.length) slotSources.push({ owner:"weapon", label:"Arma", slots:weaponEff.slots, kind:"weapon" });
  for (const s of SLOTS) { const p = pieceById[lo.pieces[s]]; if (p) slotSources.push({ owner:s, label:SLOT_LABEL[s], slots:p.slots, kind:"armor" }); }

  return (
    <div className="mh-grid">
      <section className="mh-builder">
        <div className="mh-eyebrow">Equipaggiamento <button className="mh-reset" onClick={reset}>azzera</button></div>

        <div className="mh-slotcard">
          <div className="mh-slotcard-h"><span className="mh-slot-icon">⚔</span><span className="mh-slot-label">Arma</span>
            {weapon && weapon.id !== "w0" && <span className="mh-rank">{WKINDS[weapon.kind] || weapon.kind}</span>}</div>
          <WeaponPicker weapons={data.weapons} value={lo.weapon} onChange={setWeapon} data={data} />
          {weapon && weapon.id !== "w0" && <WeaponInfo w={weaponEff} data={data} />}
          {weapon && weapon.id !== "w0" && (
            <WeaponMods data={data} weapon={weapon} wmods={lo.wmods || {}}
              onPatch={setWmod} onSlots={setWSlots} onSkills={arr => setWmod({ skills: arr })} />
          )}
        </div>

        {SLOTS.map(slot => {
          const p = pieceById[lo.pieces[slot]];
          return (
            <div className="mh-slotcard" key={slot}>
              <div className="mh-slotcard-h"><span className="mh-slot-icon">{ICONS[slot]}</span><span className="mh-slot-label">{SLOT_LABEL[slot]}</span>
                {p && <span className="mh-rank">{rankLabel(p.rank)}</span>}</div>
              <PiecePicker options={piecesBySlot[slot]} value={lo.pieces[slot]} onChange={id => setPiece(slot, id)} data={data} />
              {p && <PieceSkills piece={p} data={data} />}
            </div>
          );
        })}

        <div className="mh-slotcard">
          <div className="mh-slotcard-h"><span className="mh-slot-icon">✦</span><span className="mh-slot-label">Charm</span></div>
          <CharmPicker charms={data.charms} value={lo.charm} onChange={setCharm} data={data} />
          {lo.charm && lo.charm !== "c0" && (
            <div className="mh-manual-wrap">
              <div className="mh-manual-h">Abilità manuali</div>
              <ManualSkills data={data} entries={lo.cskills || []} onChange={setCSkills} />
            </div>
          )}
        </div>

            {src.slots.map((size, i) => {
              const key = src.owner + "#" + i;
              const opts = data.decos.filter(d => d.size <= size && d.kind === src.kind);
              return (
                <div className="mh-decoslot" key={key}>
                  <span className="mh-slotpip" data-size={size}>{size}</span>
                  <DecoPicker options={opts} value={lo.decos[key] || ""} onChange={id => setDeco(key, id)} data={data} size={size} />
                </div>
              );
            })}

        ))}

      <aside className="mh-summary">

        <div className="mh-save">
          <input className="mh-input" placeholder="Nome build…" value={name} onChange={e => setName(e.target.value)} />
          <button className="mh-btn" onClick={save}>Salva</button>
        </div>
        {builds.length > 0 && (
          <div className="mh-saved">
            {builds.map(b => (
              <span className="mh-chip" key={b.id}>
                <button className="mh-chip-name" onClick={() => load(b)} disabled={!b.lo}
                  title={b.lo ? "Richiama questa build per modificarla" : "Build salvata prima dell'aggiornamento: non richiamabile"}>{b.name}</button>
                <button className="mh-chip-x" onClick={() => del(b.id)}>×</button>
              </span>
            ))}
            <button className="mh-link" onClick={() => setTab("compare")}>Confronta ({builds.length}) →</button>
          </div>
        )}
      </aside>
    </div>
  );
}

/* ------------------------- valutazione build ------------------------------
   Modello euristico basato sul meta di MH Wilds (2026). Le abilità condizionali
   (Punto debole, Massima potenza, Istigatore, Risentimento) sono considerate
   ATTIVE, come nelle build meta. Valori per-livello presi dall'API MHDB.
   -------------------------------------------------------------------------- */
const META = {
  aff:  { 3:[4,8,12,16,20], 57:[5,10,15,20,30], 99:[10,20,30], 144:[3,5,7,10,15] }, // affinità % per liv.
  flat: { 72:[3,5,7,8,9], 144:[4,8,12,16,20], 123:[5,10,15,20,25] },                 // ATT fisico piatto
  pct:  { 72:[0,0,0,2,4], 87:[0,5,5,10,30] },                                        // ATT fisico %
  crit: { 22:[28,31,34,37,40] },                                                     // danno critico %
  elem: { 82:1, 13:1, 152:1, 50:1, 91:1, 121:1, 127:1, 41:1 },                       // sinergia elementale
  status:{ 68:1, 9:1, 44:1, 12:1, 116:1, 79:1, 5:1, 40:1 },                          // sinergia stato
  sustain:{ 119:1, 124:1, 126:1, 117:1, 163:1 },                                     // artigianato/affilatura
  WEX:57, AGI:144, MM:99, RES:123, CB:22, DIVINE:122, REC_UP:31, REC_SPD:30,
};
function scoreBuild(sl, w, def, res, bonuses) {
  const lv = id => sl[id] || 0;
  const at = (tab, id) => (tab[id] && lv(id)) ? (tab[id][lv(id) - 1] || 0) : 0;
  const hasWeapon = w && w.id !== "w0";

  let flat = 0, pct = 0, affSkills = 0;
  for (const id in META.flat) flat += at(META.flat, id);
  for (const id in META.pct) pct += at(META.pct, id);
  for (const id in META.aff) affSkills += at(META.aff, id);
  const affTotal = Math.max(-100, Math.min(100, (hasWeapon ? w.aff : 0) + affSkills));
  const critPct = lv(META.CB) ? META.crit[META.CB][lv(META.CB) - 1] : 25; // critico base +25%
  const rawTotal = ((hasWeapon ? w.raw : 0) + flat) * (1 + pct / 100);
  const critFactor = affTotal >= 0 ? 1 + (affTotal / 100) * (critPct / 100) : 1 + (affTotal / 100) * 0.25;
  const efr = hasWeapon ? Math.round(rawTotal * critFactor) : 0;

  // --- Offesa (0-100) ---
  let off = 0;
  if (hasWeapon) {
    off += Math.max(0, Math.min(affTotal, 100)) / 100 * 35;   // rateo critico
    off += Math.max(0, critPct - 25) / 15 * 20;               // danno critico
    off += Math.min(flat, 40) / 40 * 15;                      // attacco piatto
    off += lv(META.WEX) ? 10 : 0;                             // core meta
    off += (lv(META.AGI) || lv(META.MM) || lv(META.RES)) ? 8 : 0;
    let syn = 0; for (const id in META.elem) if (lv(id)) syn = 1; for (const id in META.status) if (lv(id)) syn = 1;
    const elemActive = (w.el || w.st) ? 1 : 0;
    off += elemActive ? (syn ? 7 : 3) : 0;                    // sinergia elem/stato
    let sus = 0; for (const id in META.sustain) if (lv(id)) sus = 1;
    off += sus ? 5 : 0;                                       // sostenibilità
  }
  off = Math.round(Math.min(100, off));

  // --- Sopravvivenza (0-100) ---
  const resSum = ["f", "w", "t", "i", "d"].reduce((a, k) => a + (res[k] > 0 ? res[k] : 0), 0);
  const divineMit = [0, 0.06, 0.12, 0.20][lv(META.DIVINE)] || 0;
  const gutsRe = /guts|tenac|sopravviv|colpo letale|eroic|salute/i;
  const guts = (bonuses || []).some(b => gutsRe.test(b.name || "") || gutsRe.test(b.desc || ""));
  let surv = 0;
  surv += Math.min(def, 600) / 600 * 45;
  surv += divineMit * 100;
  surv += Math.min(resSum, 60) / 60 * 15;
  surv += Math.min(lv(META.REC_UP) + lv(META.REC_SPD), 6) / 6 * 8;
  surv += guts ? 12 : 0;
  surv = Math.round(Math.min(100, surv));

  const overall = Math.round(off * 0.65 + surv * 0.35);
  const grade = overall >= 85 ? "S" : overall >= 70 ? "A" : overall >= 55 ? "B" : overall >= 40 ? "C" : "D";

  const notes = [];
  if (!hasWeapon) notes.push("Nessuna arma: valutazione solo difensiva");
  else {
    if (affTotal >= 90 && lv(META.CB) >= 3) notes.push("Nucleo critico eccellente");
    else if (affTotal < 100) notes.push(`Affinità ${affTotal > 0 ? "+" : ""}${affTotal}% (il meta punta al 100%)`);
    if (!lv(META.CB)) notes.push("Manca Bonus critico");
    if (!lv(META.WEX)) notes.push("Manca Punto debole");
  }
  if (surv < 30) notes.push("Sopravvivenza bassa");
  return { overall, grade, offense: off, survival: surv, efr, affinity: affTotal, guts, notes };
}

/* ------------------------- calcolo aggregato ------------------------------ */
function compute(lo, ctx) {
  const { pieceById, decoById, charmById, weaponById, skills, bonuses } = ctx;
  const raw = {}; const add = (sid, l) => { raw[sid] = (raw[sid] || 0) + l; };
  let def = 0; const res = { f:0,w:0,t:0,i:0,d:0 }; const bonusCount = {};

  for (const s of SLOTS) { const p = pieceById[lo.pieces[s]]; if (!p) continue;
    def += p.def; ELEM.forEach(([k]) => res[k] += p.res[k]);
    p.skills.forEach(([sid, l]) => add(sid, l));
    p.bonuses.forEach(bid => { bonusCount[bid] = (bonusCount[bid] || 0) + 1; });
  }
  const w = weaponById[lo.weapon];
  const wEff = effectiveWeapon(w, lo.wmods);
  if (wEff) wEff.skills.forEach(([sid, l]) => add(sid, l));
  const ch = charmById[lo.charm]; if (ch) ch.skills.forEach(([sid, l]) => add(sid, l));
  (lo.cskills || []).forEach(([sid, l]) => add(sid, l));
  Object.values(lo.decos).forEach(id => { const d = decoById[id]; if (d) d.skills.forEach(([sid, l]) => add(sid, l)); });

  const activeBonuses = [];
  for (const [bid, have] of Object.entries(bonusCount)) {
    const meta = bonuses[bid]; if (!meta) continue;
    const reached = (meta.thresholds || []).filter(t => have >= t.pieces);
    if (reached.length) { const top = reached[reached.length - 1]; activeBonuses.push({ id: bid, name: meta.name, kind: meta.kind, have, desc: top.desc, at: top.pieces }); }
  }
  activeBonuses.sort((a, b) => a.kind === b.kind ? 0 : a.kind === "group" ? -1 : 1);

  const skillList = Object.entries(raw).map(([sid, r]) => {
    const m = skills[sid] || { name: sid, max: r, cat: "util", desc: "", levels: [] };
    return { id: sid, name: m.name, cat: m.cat, desc: m.desc, levels: m.levels || [], level: Math.min(r, m.max), max: m.max, over: Math.max(0, r - m.max) };
  }).sort((a, b) => a.cat === b.cat ? b.level - a.level : ord(a.cat) - ord(b.cat));

  const slmap = {}; skillList.forEach(s => { slmap[s.id] = s.level; });
  const score = scoreBuild(slmap, wEff, def, res, activeBonuses);

  return { def, res, skills: skillList, activeBonuses, score, atk: wEff ? wEff.raw : 0, aff: wEff ? wEff.aff : 0, el: wEff ? wEff.el : null, st: wEff ? wEff.st : null };
}
const ord = (c) => ({ off:0, util:1, def:2 }[c] ?? 3);
const rankLabel = (r) => r === "low" ? "LR" : r === "high" ? "HR" : r === "master" ? "MR" : (r || "").toUpperCase();

/* ------------------------- confronto -------------------------------------- */
function Compare({ builds, del, load, goBuild }) {
  if (builds.length === 0)
    return <div className="mh-compare"><p className="mh-empty big">Nessuna build salvata. Creane una nel <button className="mh-link" onClick={goBuild}>Costruttore</button> e premi Salva.</p></div>;
  const names = []; const seen = new Set();
  builds.forEach(b => b.skills.forEach(s => { if (!seen.has(s.name)) { seen.add(s.name); names.push({ name: s.name, cat: s.cat }); } }));
  names.sort((a, b) => a.cat === b.cat ? a.name.localeCompare(b.name) : ord(a.cat) - ord(b.cat));
  const lvl = (b, n) => { const s = b.skills.find(x => x.name === n); return s ? s.level : 0; };
  const mx = (n) => Math.max(...builds.map(b => lvl(b, n)));
  const maxDef = Math.max(...builds.map(b => b.def));
  const maxOverall = Math.max(...builds.map(b => b.overall || 0));
  const maxEfr = Math.max(...builds.map(b => b.efr || 0));
  return (
    <div className="mh-compare">
      <div className="mh-ctablewrap"><table className="mh-ctable">
        <thead><tr><th className="mh-ccorner">Confronto</th>
          {builds.map(b => <th key={b.id}><div className="mh-cbuild">
            {b.lo ? <button className="mh-cload" onClick={() => load(b)} title="Richiama e modifica">{b.name}</button> : <span>{b.name}</span>}
            <button onClick={() => del(b.id)}>×</button></div></th>)}</tr></thead>
        <tbody>
          <tr className="mh-crow-rank"><td>Rank</td>{builds.map(b => <td key={b.id}><span className={"mh-grade sm grade-" + (b.grade || "C")}>{b.grade || "–"}</span></td>)}</tr>
          <tr className="mh-crow-stat"><td>Voto</td>{builds.map(b => <td key={b.id} className={maxOverall > 0 && (b.overall || 0) === maxOverall ? "best" : ""}>{b.overall ?? "–"}</td>)}</tr>
          <tr><td>Offesa</td>{builds.map(b => <td key={b.id}>{b.offense ?? "–"}</td>)}</tr>
          <tr><td>Sopravv.</td>{builds.map(b => <td key={b.id}>{b.survival ?? "–"}</td>)}</tr>
          <tr><td>EFR</td>{builds.map(b => <td key={b.id} className={maxEfr > 0 && (b.efr || 0) === maxEfr ? "best" : ""}>{b.efr || "–"}</td>)}</tr>
          <tr className="mh-crow-stat"><td>Difesa</td>{builds.map(b => <td key={b.id} className={b.def === maxDef ? "best" : ""}>{b.def}</td>)}</tr>
          <tr><td>Attacco</td>{builds.map(b => <td key={b.id}>{b.atk || "–"}</td>)}</tr>
          <tr><td>Affinità</td>{builds.map(b => <td key={b.id} style={{ color: (b.aff||0) < 0 ? "#d1603a" : (b.aff||0) > 0 ? "#5fae7f" : "#a2957b" }}>{b.aff ? (b.aff>0?"+":"")+b.aff+"%" : "–"}</td>)}</tr>
          {ELEM.map(([k, label]) => (
            <tr className="mh-crow-res" key={k}><td>{label}</td>
              {builds.map(b => { const v = b.res?.[k] ?? 0; return <td key={b.id} style={{ color: v < 0 ? "#d1603a" : v > 0 ? "#5fae7f" : "#a2957b" }}>{v > 0 ? "+" : ""}{v}</td>; })}</tr>
          ))}
          <tr className="mh-csection"><td colSpan={builds.length + 1}>Abilità</td></tr>
          {names.map(sn => { const top = mx(sn.name); return (
            <tr key={sn.name}><td className="mh-cskill">{sn.name}</td>
              {builds.map(b => { const v = lvl(b, sn.name); return <td key={b.id} className={v > 0 && v === top ? "best" : v === 0 ? "zero" : ""}>{v || "–"}</td>; })}</tr>
          ); })}
        </tbody>
      </table></div>
      <button className="mh-link" onClick={goBuild}>← Torna al costruttore</button>
    </div>
  );
}

function DecoPicker({ options, value, onChange, data, size }) {
  const [open, setOpen] = useState(false); const [q, setQ] = useState(""); const ref = useRef(null);
  useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  const sel = options.find(o => o.id === value); const ql = q.toLowerCase();
  const filtered = ql ? options.filter(o => (o.name + " " + skillsText(o, data)).toLowerCase().includes(ql)) : options;
  return (
    <div className="mh-picker" ref={ref}>
      <button className="mh-select mh-select-sm mh-pickbtn" onClick={() => setOpen(o => !o)}>{sel ? sel.name : <span className="mh-ph">— slot [{size}] vuoto —</span>}<span className="mh-caret">▾</span></button>
      {open && (
        <div className="mh-pickpop">
          <input autoFocus className="mh-input mh-picksearch" placeholder="Cerca gioiello o abilità…" value={q} onChange={e => setQ(e.target.value)} />
          <div className="mh-picklist">
            <button className="mh-pickitem" onClick={() => { onChange(""); setOpen(false); setQ(""); }}>— slot [{size}] vuoto —</button>
            {filtered.slice(0, 200).map(o => (
              <button key={o.id} className={"mh-pickitem" + (o.id === value ? " sel" : "")} onClick={() => { onChange(o.id); setOpen(false); setQ(""); }}>
                <span className="mh-pickname">{o.name}</span>
                <span className="mh-picksk">{skillsText(o, data)}</span></button>
            ))}
            {filtered.length === 0 && <div className="mh-empty" style={{ padding: "8px 10px" }}>Nessun risultato.</div>}
          </div>
        </div>
      )}
    </div>
  );
}
function CharmPicker({ charms, value, onChange, data }) {
  const [open, setOpen] = useState(false); const [q, setQ] = useState(""); const ref = useRef(null);
  useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  const sel = charms.find(c => c.id === value); const ql = q.toLowerCase();
  const filtered = ql ? charms.filter(c => (c.name + " " + skillsText(c, data)).toLowerCase().includes(ql)) : charms;
  return (
    <div className="mh-picker" ref={ref}>
      <button className="mh-select mh-pickbtn" onClick={() => setOpen(o => !o)}>{sel && sel.id !== "c0" ? sel.name : <span className="mh-ph">— nessun charm —</span>}<span className="mh-caret">▾</span></button>
      {open && (
        <div className="mh-pickpop">
          <input autoFocus className="mh-input mh-picksearch" placeholder="Cerca charm o abilità…" value={q} onChange={e => setQ(e.target.value)} />
          <div className="mh-picklist">
            {filtered.slice(0, 300).map(c => (
              <button key={c.id} className={"mh-pickitem" + (c.id === value ? " sel" : "")} onClick={() => { onChange(c.id); setOpen(false); setQ(""); }}>
                <span className="mh-pickname">{c.name}</span>
                {c.skills.length > 0 && <span className="mh-picksk">{skillsText(c, data)}</span>}</button>

function skillsText(p, data) { return p.skills.map(([sid, l]) => (data.skills[sid]?.name || "") + " " + l).join(" · "); }

function PieceSkills({ piece, data }) {
  return (
    <div className="mh-pieceskills">
      {piece.skills.map(([sid, l]) => <span className="mh-tag" key={sid}>{data.skills[sid]?.name || sid} <b>{l}</b></span>)}
      {piece.slots.map((s, i) => <span className="mh-tag mh-tag-slot" key={"s" + i}>[{s}]</span>)}
      <span className="mh-tag mh-tag-def">DEF {piece.def}</span>
    </div>
  );
}
function WeaponInfo({ w, data }) {
  return (
    <div className="mh-pieceskills">
      <span className="mh-tag mh-tag-def">Att {w.raw}</span>
      <span className="mh-tag mh-tag-def">Aff {w.aff}%</span>
      {w.el && <span className="mh-tag">{w.el[0]} {w.el[1]}</span>}
      {w.st && <span className="mh-tag">{w.st[0]} {w.st[1]}</span>}
      {w.skills.map(([sid, l], i) => <span className="mh-tag" key={"sk" + i}>{data.skills[sid]?.name || sid} <b>{l}</b></span>)}
      {w.slots.map((s, i) => <span className="mh-tag mh-tag-slot" key={"s" + i}>[{s}]</span>)}

}

/* Editor abilità manuali: aggiunge coppie [abilità, livello] a un elenco.
   Usato per i charm con abilità casuali e per le abilità delle armi Artian. */
function ManualSkills({ data, entries, onChange }) {
  const [open, setOpen] = useState(false); const [q, setQ] = useState(""); const ref = useRef(null);
  useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  const all = useMemo(() => Object.entries(data.skills).map(([id, s]) => ({ id, name: s.name, max: s.max })).sort((a, b) => a.name.localeCompare(b.name)), [data]);
  const has = new Set(entries.map(e => String(e[0]))); const ql = q.toLowerCase();
  const filtered = all.filter(s => !has.has(String(s.id)) && (!ql || s.name.toLowerCase().includes(ql)));
  const addSkill = (s) => { onChange([...entries, [isNaN(Number(s.id)) ? s.id : Number(s.id), 1]]); setQ(""); setOpen(false); };
  const setLvl = (idx, lvl) => { const max = data.skills[entries[idx][0]]?.max || 99; const v = Math.max(1, Math.min(max, lvl)); onChange(entries.map((e, i) => i === idx ? [e[0], v] : e)); };
  const remove = (idx) => onChange(entries.filter((_, i) => i !== idx));
  return (
    <div className="mh-manual">
      {entries.length > 0 && (
        <div className="mh-manual-list">
          {entries.map((e, idx) => { const m = data.skills[e[0]] || { name: e[0], max: 1 };
            return (
              <div className="mh-manual-row" key={idx}>
                <span className="mh-manual-name">{m.name}</span>
                <span className="mh-stepper">
                  <button onClick={() => setLvl(idx, e[1] - 1)} disabled={e[1] <= 1}>−</button>
                  <b>{e[1]}</b><i>/{m.max}</i>
                  <button onClick={() => setLvl(idx, e[1] + 1)} disabled={e[1] >= m.max}>+</button>
                </span>
                <button className="mh-manual-x" onClick={() => remove(idx)}>×</button>
              </div>
            );
          })}
        </div>
      )}
      <div className="mh-picker" ref={ref}>
        <button className="mh-manual-add" onClick={() => setOpen(o => !o)}>＋ Aggiungi abilità</button>
        {open && (
          <div className="mh-pickpop">
            <input autoFocus className="mh-input mh-picksearch" placeholder="Cerca abilità…" value={q} onChange={e => setQ(e.target.value)} />
            <div className="mh-picklist">
              {filtered.slice(0, 200).map(s => (
                <button key={s.id} className="mh-pickitem" onClick={() => addSkill(s)}>
                  <span className="mh-pickname">{s.name} <em>max {s.max}</em></span></button>
              ))}
              {filtered.length === 0 && <div className="mh-empty" style={{ padding: "8px 10px" }}>Nessun risultato.</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* Modifica manuale dei valori "rollati" di un'arma Artian: attacco, affinità,
   elemento/stato, slot e abilità. Gli override vivono in lo.wmods. */
function WeaponMods({ data, weapon, wmods, onPatch, onSlots, onSkills }) {
  const [open, setOpen] = useState(false);
  const m = wmods || {};
  const baseType = weapon.el ? codeFromLabel(weapon.el[0]) : weapon.st ? codeFromLabel(weapon.st[0]) : "none";
  const curType = m.dmgType !== undefined ? m.dmgType : baseType;
  const curVal = m.dmgVal !== undefined ? m.dmgVal : (weapon.el ? weapon.el[1] : weapon.st ? weapon.st[1] : 0);
  const slotsStr = (m.slots != null ? m.slots : weapon.slots || []).join(",");
  const numOr = (v) => v === "" ? undefined : Number(v);
  return (
    <div className="mh-artian">
      <button className="mh-artian-toggle" onClick={() => setOpen(o => !o)}>{open ? "▾" : "▸"} Valori manuali / Artian</button>
      {open && (
        <div className="mh-artian-body">
          <div className="mh-artian-grid">
            <label>Attacco<input type="number" value={m.raw ?? weapon.raw} onChange={e => onPatch({ raw: numOr(e.target.value) })} /></label>
            <label>Affinità %<input type="number" value={m.aff ?? weapon.aff} onChange={e => onPatch({ aff: numOr(e.target.value) })} /></label>
            <label>Slot<input value={slotsStr} placeholder="es. 3,1,1" onChange={e => onSlots(parseSlots(e.target.value))} /></label>
            <label>Elemento / Stato
              <select value={curType} onChange={e => onPatch({ dmgType: e.target.value })}>
                <option value="none">Nessuno</option>
                {WDMG.map(([c, l]) => <option key={c} value={c}>{l}</option>)}
              </select>
            </label>
            <label>Valore<input type="number" value={curVal} disabled={curType === "none"} onChange={e => onPatch({ dmgVal: Number(e.target.value) || 0 })} /></label>
          </div>
          <div className="mh-manual-h">Abilità arma</div>
          <ManualSkills data={data} entries={m.skills || []} onChange={onSkills} />
        </div>
      )}
    </div>
  );
}

.mh-ctablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;}
.mh-ctable{border-collapse:collapse;width:100%;min-width:420px;}
.mh-ctable th,.mh-ctable td{padding:8px 12px;text-align:center;border-bottom:1px solid #241c11;font-size:13px;}
.mh-ctable thead th{background:#0f0b07;position:sticky;top:0;}
.mh-ccorner{text-align:left!important;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);font-size:11px;}
.mh-cbuild{display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--bone);}
.mh-cbuild button{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:15px;} .mh-cbuild button:hover{color:var(--ember);}
.mh-ctable td:first-child,.mh-cskill{text-align:left!important;color:var(--muted);}
.mh-crow-stat td{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--bone);}
.mh-csection td{background:#0f0b07;text-align:left;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dim);font-size:11px;}
.mh-ctable td.best{color:var(--gold);font-weight:700;background:rgba(240,176,62,.08);} .mh-ctable td.zero{color:#4a4030;}
.mh-loading{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);text-align:center;padding:0 20px;}
.mh-loading p{font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--bone);margin:0;}
.mh-loading-sub{font-size:12px;max-width:340px;}
.mh-footer{max-width:1140px;margin:6px auto 0;padding:14px 18px 0;font-size:11.5px;color:var(--muted);line-height:1.6;border-top:1px solid var(--line);}
/* --- valutazione build --- */
.mh-score{display:flex;gap:12px;align-items:stretch;background:#0f0b07;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px;}
.mh-grade{flex:none;width:62px;display:grid;place-items:center;border-radius:9px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:38px;line-height:1;border:1px solid var(--line);}
.mh-grade.sm{width:30px;height:30px;font-size:17px;margin:0 auto;}
.grade-S{color:#f0b03e;border-color:#b5832b;background:radial-gradient(circle at 50% 35%,rgba(240,176,62,.28),transparent 70%);text-shadow:0 0 12px rgba(240,176,62,.6);}
.grade-A{color:#5fae7f;border-color:#33513f;background:radial-gradient(circle at 50% 35%,rgba(95,174,127,.22),transparent 70%);}
.grade-B{color:#6bb8c9;border-color:#33505a;background:radial-gradient(circle at 50% 35%,rgba(107,184,201,.18),transparent 70%);}
.grade-C{color:#c9a86b;border-color:#5a4a2e;}
.grade-D{color:#a2957b;border-color:var(--line);}
.mh-score-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px;justify-content:center;}
.mh-score-bars{display:flex;flex-direction:column;gap:5px;}
.mh-sbar{display:flex;align-items:center;gap:8px;}
.mh-sbar-l{flex:none;width:60px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.mh-sbar-track{flex:1;height:8px;background:#2a2114;border:1px solid #342810;border-radius:5px;overflow:hidden;}
.mh-sbar-fill{height:100%;border-radius:5px;transition:width .25s;}
.mh-sbar-fill.off{background:linear-gradient(90deg,#b5832b,#f0b03e);}
.mh-sbar-fill.surv{background:linear-gradient(90deg,#3d6d5a,#6bb8c9);}
.mh-sbar-v{flex:none;width:24px;text-align:right;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--bone);}
.mh-score-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;color:var(--muted);}
.mh-score-meta b{color:var(--bone);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;margin-left:2px;}
.mh-score-notes{display:flex;flex-wrap:wrap;gap:5px;}
.mh-score-notes span{font-size:10.5px;color:var(--gold-dim);background:#1a140d;border:1px solid var(--line);border-radius:12px;padding:1px 8px;}
.mh-crow-rank td{padding-top:10px;padding-bottom:6px;}
/* --- livelli abilità --- */
.mh-skill-flavor{margin-bottom:6px;}
.mh-lvls{display:flex;flex-direction:column;gap:3px;}
.mh-lvl{display:flex;gap:8px;align-items:baseline;padding:3px 6px;border-radius:5px;font-size:11.5px;color:var(--muted);}
.mh-lvl.done{color:#8f8261;}
.mh-lvl.cur{background:rgba(240,176,62,.1);color:var(--bone);border:1px solid var(--gold-dim);}
.mh-lvl-n{flex:none;width:34px;font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--gold-dim);}
.mh-lvl.cur .mh-lvl-n{color:var(--gold);}
.mh-lvl-d{flex:1;line-height:1.35;}
/* --- input manuale (charm / Artian) --- */
.mh-manual-wrap{margin-top:10px;border-top:1px solid var(--line);padding-top:9px;}
.mh-manual-h{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dim);margin:0 0 7px;}
.mh-manual-list{display:flex;flex-direction:column;gap:5px;margin-bottom:7px;}
.mh-manual-row{display:flex;align-items:center;gap:8px;background:#0f0b07;border:1px solid var(--line);border-radius:7px;padding:4px 6px 4px 10px;}
.mh-manual-name{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mh-stepper{display:flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--muted);}
.mh-stepper b{color:var(--bone);font-weight:700;min-width:12px;text-align:center;} .mh-stepper i{font-style:normal;font-size:11px;}
.mh-stepper button{width:22px;height:22px;line-height:1;background:#1a140d;border:1px solid var(--line);color:var(--gold);border-radius:5px;cursor:pointer;font-size:15px;font-weight:700;padding:0;}
.mh-stepper button:hover:not(:disabled){border-color:var(--gold-dim);} .mh-stepper button:disabled{opacity:.35;cursor:default;}
.mh-manual-x{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;padding:0 3px;} .mh-manual-x:hover{color:var(--ember);}
.mh-manual-add{width:100%;background:#0f0b07;border:1px dashed var(--gold-dim);color:var(--gold);border-radius:7px;padding:7px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
.mh-manual-add:hover{background:#1a140d;border-style:solid;}
.mh-artian{margin-top:9px;border-top:1px solid var(--line);padding-top:8px;}
.mh-artian-toggle{width:100%;text-align:left;background:transparent;border:none;color:var(--gold-dim);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;padding:2px 0;}
.mh-artian-toggle:hover{color:var(--gold);}
.mh-artian-body{margin-top:9px;}
.mh-artian-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;}
.mh-artian-grid label{display:flex;flex-direction:column;gap:3px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.mh-artian-grid label:nth-child(3){grid-column:1 / -1;}
.mh-artian-grid input,.mh-artian-grid select{background:#0f0b07;border:1px solid var(--line);border-radius:6px;color:var(--bone);padding:7px 8px;font-size:13px;font-family:inherit;width:100%;appearance:none;}
.mh-artian-grid input:focus,.mh-artian-grid select:focus{outline:2px solid var(--gold);border-color:var(--gold);}
.mh-artian-grid input:disabled{opacity:.4;}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
